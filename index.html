<body class="text-slate-800 bg-slate-100 h-screen flex flex-col overflow-hidden">

    <!-- DATA STORAGE -->
    <script>const DB = [{"id":11,"comp":"Competencias Funcionales Generales","tema":"Constitución Política Colombiana","txt":"La Constitución Política de 1991 define a Colombia como un Estado Social de Derecho, concepto que impone a todas las autoridades públicas deberes orientados a la garantía efectiva de los derechos fundamentales, la protección de la dignidad humana y la prevalencia del interés general. Para un Profesional Universitario Grado 02 de la CGR, este principio implica que las actuaciones administrativas y de control fiscal deben evaluarse no solo desde la legalidad formal, sino desde su impacto material en los fines del Estado.","opts":{"A":"Un modelo estatal limitado al cumplimiento formal de la ley sin enfoque social.","B":"Un Estado basado exclusivamente en la autonomía privada y el libre mercado.","C":"Un Estado fundado en la dignidad humana, el interés general y la efectividad de los derechos.","D":"Un sistema político sin intervención del control público."},"ans":"C","just":"El artículo 1 constitucional define a Colombia como un Estado Social de Derecho."},{"id":12,"comp":"Competencias Funcionales Generales","tema":"Constitución Política Colombiana","txt":"El principio de supremacía constitucional orienta todas las actuaciones de las autoridades públicas y garantiza que ninguna norma o acto pueda contrariar la Constitución. En el ejercicio del control fiscal y la función administrativa, este principio obliga a la CGR y a sus servidores a inaplicar normas inferiores que contradigan la Carta Política, asegurando la coherencia del orden jurídico y la protección del interés general.","opts":{"A":"La Constitución tiene el mismo rango que la ley.","B":"La Constitución prevalece sobre todas las demás normas del ordenamiento jurídico.","C":"Los actos administrativos prevalecen sobre la Constitución.","D":"Las normas internacionales sustituyen la Constitución automáticamente."},"ans":"B","just":"El artículo 4 establece que la Constitución es norma de normas."},{"id":13,"comp":"Competencias Funcionales Generales","tema":"Constitución Política Colombiana","txt":"La Constitución establece la separación de poderes como mecanismo para evitar la concentración del poder y asegurar controles recíprocos entre las ramas del poder público. En este esquema, el control fiscal ejercido por la CGR se configura como una función autónoma que contribuye al equilibrio institucional y a la vigilancia del uso de los recursos públicos, sin sustituir las funciones de las demás ramas.","opts":{"A":"Supone subordinación del control fiscal al Ejecutivo.","B":"Elimina los controles entre las ramas del poder público.","C":"Establece colaboración armónica con funciones separadas y control recíproco.","D":"Autoriza que una rama asuma funciones exclusivas de otra."},"ans":"C","just":"El artículo 113 consagra separación de poderes y colaboración armónica."},{"id":14,"comp":"Competencias Funcionales Generales","tema":"Constitución Política Colombiana","txt":"Los fines esenciales del Estado orientan toda la actividad administrativa y de control. Para la CGR, estos fines permiten evaluar si la gestión fiscal contribuye realmente al cumplimiento de los objetivos estatales, entre ellos la efectividad de los derechos, la prosperidad general y la convivencia pacífica, elementos que deben reflejarse en el uso adecuado de los recursos públicos.","opts":{"A":"Incrementar exclusivamente los ingresos del Estado.","B":"Servir a la comunidad y garantizar la efectividad de los derechos y deberes.","C":"Sustituir la función judicial por la administrativa.","D":"Delegar el control fiscal a particulares."},"ans":"B","just":"El artículo 2 consagra los fines esenciales del Estado."},{"id":15,"comp":"Competencias Funcionales Generales","tema":"Constitución Política Colombiana","txt":"El principio de legalidad es una garantía fundamental del Estado constitucional y limita el actuar de los servidores públicos. En la función fiscalizadora y administrativa, este principio implica que toda actuación debe estar expresamente atribuida por la Constitución o la ley, evitando extralimitaciones y protegiendo la seguridad jurídica.","opts":{"A":"Autoriza actuaciones discrecionales sin límite legal.","B":"Permite crear competencias por interpretación extensiva.","C":"Exige que toda actuación esté fundada en la Constitución y la ley.","D":"Restringe el control fiscal solo a lo contable."},"ans":"C","just":"Los artículos 6 y 121 consagran el principio de legalidad."},{"id":16,"comp":"Competencias Funcionales Generales","tema":"Constitución Política Colombiana","txt":"La responsabilidad de los servidores públicos es un pilar del Estado Social de Derecho y se activa frente a la infracción de la Constitución, la ley o por la omisión o extralimitación en el ejercicio de funciones. Para la CGR, este principio es base del control fiscal y disciplinario, garantizando la correcta gestión de los recursos públicos.","opts":{"A":"Aplica solo si hay dolo comprobado.","B":"Se limita a los particulares que administran fondos públicos.","C":"Surge por infracción de la Constitución, la ley o extralimitación funcional.","D":"Excluye la responsabilidad fiscal."},"ans":"C","just":"El artículo 6 regula la responsabilidad de los servidores públicos."},{"id":17,"comp":"Competencias Funcionales Generales","tema":"Constitución Política Colombiana","txt":"El control fiscal tiene fundamento constitucional expreso y se define como una función pública orientada a vigilar la gestión fiscal de la administración y de los particulares que manejen fondos públicos. Esta función se ejerce de forma posterior y selectiva, garantizando la protección del patrimonio público.","opts":{"A":"Depende de la rama judicial.","B":"Se ejerce solo a petición ciudadana.","C":"Vigila la gestión fiscal de la administración y particulares que manejan fondos públicos.","D":"Se limita a auditorías contables sin efectos jurídicos."},"ans":"C","just":"El artículo 267 define constitucionalmente el control fiscal."},{"id":18,"comp":"Competencias Funcionales Generales","tema":"Constitución Política Colombiana","txt":"La autonomía constitucional de la Contraloría General de la República es un presupuesto indispensable para la objetividad e independencia del control fiscal. Esta autonomía se ejerce dentro del marco constitucional y legal, garantizando imparcialidad técnica y administrativa en la vigilancia de los recursos públicos.","opts":{"A":"Supone ausencia total de control.","B":"Se limita al aspecto presupuestal.","C":"Garantiza independencia técnica y administrativa dentro del marco constitucional.","D":"Permite actuar al margen de la ley."},"ans":"C","just":"La autonomía de la CGR se deriva de los artículos 267 y 268."},{"id":19,"comp":"Competencias Funcionales Generales","tema":"Constitución Política Colombiana","txt":"Desde la Constitución, el control fiscal cumple una finalidad preventiva y correctiva orientada a la protección del patrimonio público. No se limita a la imposición de sanciones, sino que busca promover la eficiencia, eficacia y economía en la gestión de los recursos públicos.","opts":{"A":"Sancionar penalmente a los gestores fiscales.","B":"Reemplazar a la administración en la gestión pública.","C":"Proteger el patrimonio público y promover la gestión eficiente del gasto.","D":"Ejercer funciones jurisdiccionales."},"ans":"C","just":"El control fiscal tiene finalidad preventiva y posterior."},{"id":20,"comp":"Competencias Funcionales Generales","tema":"Constitución Política Colombiana","txt":"La función pública, conforme a la Constitución Política, se ejerce al servicio del Estado y de la comunidad. Este mandato impone a los servidores públicos un comportamiento ético, transparente y orientado al interés general, principio rector para quienes ejercen funciones en la CGR.","opts":{"A":"Priorizar intereses particulares.","B":"Obtener beneficios personales del cargo.","C":"Actuar conforme al interés general y la Constitución.","D":"Ejercer funciones sin sujeción normativa."},"ans":"C","just":"El artículo 123 regula la función pública."},{"id":21,"comp":"Competencias Funcionales Generales","tema":"Estructura del Estado colombiano","txt":"La Constitución Política define la organización del Estado colombiano a partir de la separación de poderes y la existencia de órganos autónomos e independientes. Esta estructura busca garantizar el equilibrio institucional y el adecuado ejercicio de las funciones públicas. Para la CGR, comprender esta estructura resulta esencial para ejercer el control fiscal sin invadir competencias de otras autoridades.","opts":{"A":"El Estado se compone únicamente de la Rama Ejecutiva.","B":"El Estado está organizado en ramas del poder público, órganos autónomos e independientes.","C":"Los órganos de control hacen parte de la Rama Judicial.","D":"El Congreso dirige a todas las ramas del poder público."},"ans":"B","just":"El artículo 113 define la estructura básica del Estado colombiano."},{"id":22,"comp":"Competencias Funcionales Generales","tema":"Estructura del Estado colombiano","txt":"La Rama Ejecutiva cumple la función administrativa y dirige la acción del Estado. Dentro de su estructura se distinguen niveles nacional y territorial, lo cual resulta relevante para la CGR al momento de ejercer control fiscal sobre entidades del orden central y descentralizado.","opts":{"A":"Se limita exclusivamente al Presidente de la República.","B":"Incluye organismos del orden nacional y territorial con función administrativa.","C":"Hace parte de los órganos autónomos.","D":"Ejerce funciones jurisdiccionales."},"ans":"B","just":"La Rama Ejecutiva se estructura en niveles nacional y territorial."},{"id":23,"comp":"Competencias Funcionales Generales","tema":"Estructura del Estado colombiano","txt":"La Rama Legislativa es el órgano encargado de ejercer la función legislativa y de control político. Su estructura bicameral garantiza la representación política y territorial, elementos esenciales para el equilibrio democrático y la vigilancia de la administración pública.","opts":{"A":"Está conformada únicamente por el Congreso en pleno.","B":"Se integra por el Senado y la Cámara de Representantes.","C":"Su función principal es administrar justicia.","D":"Depende jerárquicamente del Ejecutivo."},"ans":"B","just":"El Congreso es bicameral según los artículos 114 y 132."},{"id":24,"comp":"Competencias Funcionales Generales","tema":"Estructura del Estado colombiano","txt":"La Rama Judicial cumple la función de administrar justicia en nombre de la República. Su independencia garantiza la imparcialidad de las decisiones judiciales, aspecto fundamental para el Estado de Derecho y para el control institucional que ejerce la CGR sobre la gestión pública.","opts":{"A":"Hace parte de la Rama Ejecutiva.","B":"Administra justicia de manera independiente.","C":"Depende del Congreso.","D":"Suprime los órganos de control."},"ans":"B","just":"La función judicial está regulada por el artículo 228 constitucional."},{"id":25,"comp":"Competencias Funcionales Generales","tema":"Estructura del Estado colombiano","txt":"Los órganos de control tienen como finalidad vigilar la conducta oficial y la gestión de los recursos públicos. Su autonomía constitucional garantiza que estas funciones se ejerzan sin interferencias indebidas, fortaleciendo la transparencia y la rendición de cuentas.","opts":{"A":"Dependen jerárquicamente del Presidente.","B":"Se integran exclusivamente a la Rama Judicial.","C":"Ejercen funciones de vigilancia con autonomía constitucional.","D":"Sustituyen las funciones administrativas."},"ans":"C","just":"Los órganos de control son autónomos según la Constitución."},{"id":26,"comp":"Competencias Funcionales Generales","tema":"Estructura del Estado colombiano","txt":"El Ministerio Público forma parte de los órganos de control y cumple funciones de vigilancia de la conducta oficial. Su estructura permite la defensa del orden jurídico, el patrimonio público y los derechos fundamentales.","opts":{"A":"Hace parte de la Rama Ejecutiva.","B":"Está liderado por la Contraloría General.","C":"Es encabezado por el Procurador General de la Nación.","D":"Administra justicia."},"ans":"C","just":"El artículo 275 señala al Procurador General como jefe del Ministerio Público."},{"id":27,"comp":"Competencias Funcionales Generales","tema":"Estructura del Estado colombiano","txt":"Los organismos autónomos e independientes cumplen funciones específicas asignadas por la Constitución. Su existencia fortalece el sistema de pesos y contrapesos, garantizando que determinadas funciones estatales se ejerzan con autonomía técnica y administrativa.","opts":{"A":"Pertenecen a la Rama Ejecutiva.","B":"No tienen funciones constitucionales.","C":"Ejercen funciones asignadas directamente por la Constitución.","D":"Sustituyen a las ramas del poder público."},"ans":"C","just":"La Constitución reconoce organismos autónomos e independientes."},{"id":28,"comp":"Competencias Funcionales Generales","tema":"Estructura del Estado colombiano","txt":"La organización territorial del Estado colombiano se basa en entidades autónomas que ejercen competencias propias dentro del marco constitucional. Este diseño es relevante para el control fiscal territorial que ejerce la CGR.","opts":{"A":"Elimina la autonomía territorial.","B":"Centraliza todas las funciones en la Nación.","C":"Reconoce entidades territoriales con autonomía administrativa y fiscal.","D":"Sustituye las entidades territoriales por organismos centrales."},"ans":"C","just":"El artículo 287 regula la autonomía territorial."},{"id":29,"comp":"Competencias Funcionales Generales","tema":"Estructura del Estado colombiano","txt":"El principio de descentralización administrativa permite la transferencia de competencias y recursos a entidades territoriales y descentralizadas, fortaleciendo la eficiencia del Estado. Para la CGR, este principio amplía el campo de acción del control fiscal sobre múltiples niveles de gestión pública.","opts":{"A":"Elimina el control fiscal.","B":"Sustituye la desconcentración administrativa.","C":"Distribuye competencias y recursos a entidades descentralizadas.","D":"Centraliza el gasto público."},"ans":"C","just":"La descentralización se deriva de los artículos 209 y 287."},{"id":30,"comp":"Competencias Funcionales Generales","tema":"Estructura del Estado colombiano","txt":"La estructura del Estado colombiano responde a principios constitucionales que buscan el equilibrio entre unidad y autonomía. El conocimiento de esta estructura es indispensable para que el servidor público de la CGR ejerza correctamente sus funciones dentro del marco de competencias definido por la Constitución.","opts":{"A":"Permite la concentración absoluta del poder.","B":"Suprime el sistema de control institucional.","C":"Garantiza equilibrio, control recíproco y autonomía dentro del orden constitucional.","D":"Elimina la separación de poderes."},"ans":"C","just":"La estructura estatal se fundamenta en los artículos 1, 113 y 287."},{"id":31,"comp":"Competencias Funcionales Generales","tema":"Estructura y funcionamiento de la CGR","txt":"La Contraloría General de la República es un órgano de control de rango constitucional cuya misión es vigilar la gestión fiscal de la administración pública y de los particulares que manejen fondos o bienes de la Nación. Para el ejercicio profesional en la CGR, comprender su naturaleza jurídica y su ubicación dentro de la estructura del Estado es indispensable para actuar con competencia y respeto por el orden constitucional.","opts":{"A":"Hace parte de la Rama Ejecutiva.","B":"Integra la Rama Judicial.","C":"Es un órgano de control autónomo e independiente.","D":"Se subordina al Congreso en todas sus funciones."},"ans":"C","just":"La Constitución reconoce a la CGR como órgano de control autónomo."},{"id":32,"comp":"Competencias Funcionales Generales","tema":"Estructura y funcionamiento de la CGR","txt":"El control fiscal ejercido por la Contraloría General de la República se configura como una función pública de carácter posterior y selectivo, sin perjuicio de los mecanismos de control concomitante establecidos en la ley. Esta característica define el alcance y los límites de la función fiscalizadora.","opts":{"A":"Es previo y absoluto sobre toda actuación administrativa.","B":"Es posterior y selectivo sobre la gestión fiscal.","C":"Se ejerce exclusivamente a solicitud del Congreso.","D":"Sustituye la gestión administrativa de las entidades vigiladas."},"ans":"B","just":"El artículo 267 establece el carácter posterior y selectivo del control fiscal."},{"id":33,"comp":"Competencias Funcionales Generales","tema":"Estructura y funcionamiento de la CGR","txt":"El Contralor General de la República es el jefe del organismo de control fiscal y ejerce la suprema dirección administrativa de la entidad. Su elección y funciones están definidas constitucionalmente, garantizando independencia frente a las demás ramas del poder público.","opts":{"A":"Es designado libremente por el Presidente.","B":"Es elegido por el Congreso de terna enviada por el Presidente.","C":"Es elegido por el Congreso en pleno conforme a la Constitución.","D":"Es designado por la Corte Suprema de Justicia."},"ans":"C","just":"El artículo 267 regula la elección del Contralor General."},{"id":34,"comp":"Competencias Funcionales Generales","tema":"Estructura y funcionamiento de la CGR","txt":"Las funciones del Contralor General incluyen dirigir la política del control fiscal, prescribir los métodos de rendición de cuentas y establecer responsabilidades fiscales. Estas funciones garantizan la vigilancia integral de la gestión pública.","opts":{"A":"Administrar justicia fiscal.","B":"Formular políticas públicas sectoriales.","C":"Prescribir métodos y formas de rendición de cuentas.","D":"Dirigir la Rama Ejecutiva."},"ans":"C","just":"El artículo 268 enumera las funciones del Contralor General."},{"id":35,"comp":"Competencias Funcionales Generales","tema":"Estructura y funcionamiento de la CGR","txt":"La Contraloría General ejerce control fiscal sobre la administración y sobre los particulares que manejen fondos o bienes públicos. Este alcance permite proteger de manera integral el patrimonio público frente a riesgos y irregularidades.","opts":{"A":"Solo controla entidades del orden nacional.","B":"Controla únicamente a servidores públicos.","C":"Vigila la gestión fiscal de la administración y de particulares con fondos públicos.","D":"Se limita al control presupuestal."},"ans":"C","just":"El alcance del control fiscal está definido en el artículo 267."},{"id":36,"comp":"Competencias Funcionales Generales","tema":"Estructura y funcionamiento de la CGR","txt":"La autonomía administrativa y presupuestal de la Contraloría General de la República garantiza el ejercicio independiente del control fiscal. Esta autonomía debe ejercerse dentro del marco constitucional y legal, asegurando responsabilidad y transparencia.","opts":{"A":"Autoriza actuar sin control alguno.","B":"Garantiza independencia dentro del marco constitucional y legal.","C":"Permite sustituir la función administrativa de las entidades vigiladas.","D":"Elimina la rendición de cuentas."},"ans":"B","just":"La autonomía de la CGR es de naturaleza constitucional."},{"id":37,"comp":"Competencias Funcionales Generales","tema":"Estructura y funcionamiento de la CGR","txt":"La organización interna de la CGR responde a criterios de especialización funcional, territorial y misional. Esta estructura permite ejercer control fiscal eficaz sobre distintos sectores y niveles de la administración pública.","opts":{"A":"Se organiza exclusivamente por regiones.","B":"Carece de organización interna definida.","C":"Se estructura por dependencias misionales, técnicas y territoriales.","D":"Depende de las entidades vigiladas."},"ans":"C","just":"La organización responde al modelo funcional del control fiscal."},{"id":38,"comp":"Competencias Funcionales Generales","tema":"Estructura y funcionamiento de la CGR","txt":"La función de advertencia permite a la CGR alertar sobre riesgos que puedan afectar el patrimonio público, sin que ello implique coadministración. Esta función fortalece el carácter preventivo del control fiscal.","opts":{"A":"Sustituye la gestión administrativa.","B":"Implica coadministración.","C":"Advierte riesgos sin intervenir en la gestión.","D":"Elimina el control posterior."},"ans":"C","just":"La función de advertencia tiene carácter preventivo y no decisorio."},{"id":39,"comp":"Competencias Funcionales Generales","tema":"Estructura y funcionamiento de la CGR","txt":"El principio de coordinación institucional orienta la relación de la CGR con otros órganos del Estado. Este principio garantiza el respeto por las competencias ajenas y la eficacia del control fiscal.","opts":{"A":"Supone subordinación jerárquica.","B":"Elimina la autonomía funcional.","C":"Permite articular actuaciones respetando las competencias.","D":"Sustituye el control político."},"ans":"C","just":"La coordinación se enmarca en el principio de colaboración armónica."},{"id":40,"comp":"Competencias Funcionales Generales","tema":"Estructura y funcionamiento de la CGR","txt":"El conocimiento de la estructura y funcionamiento de la Contraloría General de la República es fundamental para el desempeño de los servidores públicos, ya que asegura el ejercicio eficaz del control fiscal dentro del marco constitucional y legal.","opts":{"A":"Permite actuar sin límites normativos.","B":"Sustituye la capacitación institucional.","C":"Garantiza actuaciones ajustadas a la Constitución y la ley.","D":"Limita la autonomía técnica."},"ans":"C","just":"La actuación institucional debe ajustarse al artículo 267 y concordantes."},{"id":41,"comp":"Competencias Funcionales Generales","tema":"Conceptos básicos de control fiscal","txt":"El control fiscal es una función pública de origen constitucional orientada a la vigilancia de la gestión fiscal de la administración y de los particulares que manejen fondos o bienes públicos. Su correcta comprensión resulta esencial para el ejercicio profesional en la CGR, pues define el alcance, límites y finalidad de las actuaciones de fiscalización dentro del Estado Social de Derecho.","opts":{"A":"Una función administrativa subordinada a la rama ejecutiva.","B":"Un mecanismo político sin efectos jurídicos.","C":"Una función pública que vigila la gestión fiscal de recursos públicos.","D":"Un control exclusivo de tipo contable."},"ans":"C","just":"El artículo 267 de la Constitución define el control fiscal como función pública."},{"id":42,"comp":"Competencias Funcionales Generales","tema":"Conceptos básicos de control fiscal","txt":"La gestión fiscal comprende todas las actividades relacionadas con la administración, manejo e inversión de los recursos públicos. Para efectos del control fiscal, esta gestión debe evaluarse en términos de eficiencia, eficacia, economía y equidad, garantizando la protección del patrimonio público.","opts":{"A":"Se limita a la ejecución presupuestal.","B":"Excluye la administración de bienes públicos.","C":"Incluye todas las actividades relacionadas con el manejo de recursos y bienes públicos.","D":"Aplica únicamente a entidades del orden nacional."},"ans":"C","just":"La gestión fiscal se evalúa integralmente en el control fiscal."},{"id":43,"comp":"Competencias Funcionales Generales","tema":"Conceptos básicos de control fiscal","txt":"El principio de posterioridad del control fiscal implica que la evaluación de la gestión fiscal se realiza una vez ejecutadas las operaciones financieras. Este principio busca evitar la coadministración y preservar la autonomía de las entidades vigiladas.","opts":{"A":"Permite controlar antes de ejecutar el gasto.","B":"Implica autorización previa del gasto público.","C":"Garantiza control posterior para evitar interferencia administrativa.","D":"Elimina la responsabilidad fiscal."},"ans":"C","just":"El control fiscal es posterior según el artículo 267 constitucional."},{"id":44,"comp":"Competencias Funcionales Generales","tema":"Conceptos básicos de control fiscal","txt":"El carácter selectivo del control fiscal permite priorizar la vigilancia sobre operaciones, sectores o entidades que representen mayor riesgo para el patrimonio público. Este enfoque fortalece la eficiencia del control y optimiza el uso de recursos institucionales.","opts":{"A":"Obliga a revisar la totalidad de operaciones.","B":"Suprime el principio de legalidad.","C":"Permite seleccionar operaciones según criterios de riesgo.","D":"Elimina la responsabilidad de los gestores fiscales."},"ans":"C","just":"El control fiscal es selectivo por mandato constitucional."},{"id":45,"comp":"Competencias Funcionales Generales","tema":"Conceptos básicos de control fiscal","txt":"El control fiscal tiene una finalidad preventiva, orientada a advertir riesgos que puedan generar detrimento patrimonial. Esta finalidad se desarrolla sin que implique sustitución de la administración ni coadministración.","opts":{"A":"Sustituye la gestión de las entidades vigiladas.","B":"Elimina el control posterior.","C":"Previene riesgos que afecten el patrimonio público.","D":"Autoriza decisiones administrativas."},"ans":"C","just":"La finalidad preventiva del control fiscal protege el patrimonio público."},{"id":46,"comp":"Competencias Funcionales Generales","tema":"Conceptos básicos de control fiscal","txt":"La responsabilidad fiscal surge cuando se causa un daño al patrimonio del Estado por acción u omisión de quienes gestionan recursos públicos. Este concepto es central en la función fiscalizadora de la CGR.","opts":{"A":"Se configura sin daño patrimonial.","B":"Es exclusivamente penal.","C":"Surge por daño al patrimonio público atribuible a un gestor fiscal.","D":"Excluye a particulares."},"ans":"C","just":"La responsabilidad fiscal exige daño patrimonial."},{"id":47,"comp":"Competencias Funcionales Generales","tema":"Conceptos básicos de control fiscal","txt":"El principio de economía en la gestión fiscal busca que los recursos públicos se utilicen minimizando costos sin sacrificar calidad ni legalidad. Este principio orienta la evaluación fiscal realizada por la CGR.","opts":{"A":"Prioriza el menor costo sin importar resultados.","B":"Elimina el principio de eficacia.","C":"Optimiza el uso de recursos garantizando calidad y legalidad.","D":"Justifica recortes arbitrarios."},"ans":"C","just":"La economía es principio rector de la gestión fiscal."},{"id":48,"comp":"Competencias Funcionales Generales","tema":"Conceptos básicos de control fiscal","txt":"El principio de eficiencia evalúa la relación entre los recursos utilizados y los resultados obtenidos en la gestión fiscal. Permite establecer si los recursos públicos generan el mayor beneficio posible.","opts":{"A":"Evalúa únicamente resultados financieros.","B":"Sustituye el análisis de legalidad.","C":"Relaciona recursos utilizados con resultados obtenidos.","D":"Elimina la eficacia."},"ans":"C","just":"La eficiencia es criterio básico del control fiscal."},{"id":49,"comp":"Competencias Funcionales Generales","tema":"Conceptos básicos de control fiscal","txt":"El principio de eficacia se concentra en el cumplimiento de los objetivos y metas trazadas por la administración pública. En el control fiscal, este principio permite valorar el impacto real de la gestión pública.","opts":{"A":"Se limita al cumplimiento formal de normas.","B":"Evalúa solo costos operativos.","C":"Mide el grado de cumplimiento de objetivos y metas.","D":"Sustituye la eficiencia."},"ans":"C","just":"La eficacia es eje del control fiscal integral."},{"id":50,"comp":"Competencias Funcionales Generales","tema":"Conceptos básicos de control fiscal","txt":"El control fiscal integral combina evaluación de legalidad, resultados y uso de recursos públicos. Este enfoque integral fortalece la vigilancia y la transparencia en la gestión estatal.","opts":{"A":"Se limita a la revisión contable.","B":"Excluye evaluación de resultados.","C":"Integra legalidad, eficiencia, eficacia y economía.","D":"Sustituye el control disciplinario."},"ans":"C","just":"El control fiscal integral garantiza vigilancia completa del gasto público."},{"id":51,"comp":"Competencias Funcionales Generales","tema":"Normatividad de PQRS","txt":"La atención y trámite de las peticiones, quejas, reclamos y sugerencias (PQRS) se enmarca en el derecho fundamental de petición y constituye una obligación constitucional para todas las entidades públicas. En el contexto de la CGR, su adecuada gestión fortalece la transparencia, la participación ciudadana y la confianza institucional, además de contribuir al control social.","opts":{"A":"Un trámite discrecional condicionado a la disponibilidad institucional.","B":"Un procedimiento administrativo opcional.","C":"Una obligación constitucional derivada del derecho fundamental de petición.","D":"Un mecanismo exclusivamente interno sin incidencia jurídica."},"ans":"C","just":"El artículo 23 de la Constitución consagra el derecho fundamental de petición."},{"id":52,"comp":"Competencias Funcionales Generales","tema":"Normatividad de PQRS","txt":"El derecho de petición puede ejercerse de manera respetuosa ante las autoridades para solicitar información, consultar, presentar quejas o reclamos. Para el servidor público de la CGR, garantizar su trámite oportuno es una manifestación directa del principio de orientación al servicio y del respeto por los derechos ciudadanos.","opts":{"A":"Limitar su ejercicio solo a información reservada.","B":"Condicionar su trámite a la aprobación interna previa.","C":"Permitir a toda persona presentar solicitudes respetuosas ante las autoridades.","D":"Restringirlo a ciudadanos con interés directo."},"ans":"C","just":"El derecho de petición es de acceso universal según la Constitución."},{"id":53,"comp":"Competencias Funcionales Generales","tema":"Normatividad de PQRS","txt":"La Ley 1755 de 2015 regula el derecho fundamental de petición y establece los términos máximos para responder las solicitudes ciudadanas. Estos plazos son obligatorios para las entidades públicas y su incumplimiento compromete la responsabilidad disciplinaria del servidor.","opts":{"A":"Pueden ser modificados discrecionalmente por la entidad.","B":"Aplican únicamente a entidades territoriales.","C":"Son de obligatorio cumplimiento para todas las autoridades.","D":"Se aplican solo a solicitudes escritas."},"ans":"C","just":"La Ley 1755 de 2015 fija términos obligatorios para responder."},{"id":54,"comp":"Competencias Funcionales Generales","tema":"Normatividad de PQRS","txt":"Los plazos generales para responder un derecho de petición varían según su naturaleza: peticiones de interés general o particular, consultas, solicitudes de información o documentos. Su correcta aplicación garantiza la eficacia administrativa y el respeto por los derechos fundamentales.","opts":{"A":"Son iguales para todas las solicitudes.","B":"Se determinan según el criterio del servidor.","C":"Varían según la clase de petición presentada.","D":"Carecen de relevancia jurídica."},"ans":"C","just":"La Ley 1755 distingue plazos según el tipo de petición."},{"id":55,"comp":"Competencias Funcionales Generales","tema":"Normatividad de PQRS","txt":"El incumplimiento injustificado de los términos para atender una PQRS puede generar consecuencias disciplinarias para el servidor público responsable, al vulnerar derechos fundamentales y principios de la función administrativa.","opts":{"A":"Solo genera consecuencias políticas.","B":"No tiene efectos jurídicos.","C":"Puede generar responsabilidad disciplinaria.","D":"Se subsana automáticamente con respuesta extemporánea."},"ans":"C","just":"El incumplimiento vulnera el artículo 23 constitucional y la ley."},{"id":56,"comp":"Competencias Funcionales Generales","tema":"Normatividad de PQRS","txt":"La gestión de PQRS debe realizarse conforme a los principios de la función administrativa, garantizando transparencia, imparcialidad, celeridad y eficacia. En la CGR, estos principios orientan el fortalecimiento del control social y la confianza ciudadana.","opts":{"A":"Priorizar solo las peticiones internas.","B":"Atender solicitudes según discrecionalidad.","C":"Aplicar principios de la función administrativa.","D":"Limitar la información entregada."},"ans":"C","just":"El artículo 209 constitucional regula los principios administrativos."},{"id":57,"comp":"Competencias Funcionales Generales","tema":"Normatividad de PQRS","txt":"El sistema de PQRS constituye una herramienta de participación ciudadana y control social que permite identificar riesgos, mejorar procesos y fortalecer la gestión pública a partir de la retroalimentación ciudadana.","opts":{"A":"Sustituye el control fiscal.","B":"Carece de valor administrativo.","C":"Fortalece la participación ciudadana y el control social.","D":"Limita la gestión institucional."},"ans":"C","just":"La participación ciudadana es principio constitucional."},{"id":58,"comp":"Competencias Funcionales Generales","tema":"Normatividad de PQRS","txt":"Las entidades públicas deben llevar registro, control y seguimiento de las PQRS recibidas, garantizando trazabilidad y mejoramiento continuo de la gestión institucional. Para la CGR, esta información es un insumo relevante para auditorías y evaluaciones.","opts":{"A":"Permite eliminar solicitudes sin registro.","B":"Es opcional para las entidades.","C":"Garantiza trazabilidad y control del trámite.","D":"Aplica solo a reclamaciones judiciales."},"ans":"C","just":"El registro de PQRS asegura transparencia y control."},{"id":59,"comp":"Competencias Funcionales Generales","tema":"Normatividad de PQRS","txt":"La respuesta a una PQRS debe ser clara, congruente, de fondo y oportuna, abordando todos los aspectos planteados por el ciudadano. Este estándar de respuesta materializa el respeto por el derecho de petición.","opts":{"A":"Puede ser genérica y evasiva.","B":"Basta con acusar recibo.","C":"Debe ser clara, congruente y de fondo.","D":"Puede omitir aspectos no convenientes."},"ans":"C","just":"La respuesta de fondo garantiza efectividad del derecho."},{"id":60,"comp":"Competencias Funcionales Generales","tema":"Normatividad de PQRS","txt":"El trámite adecuado de las PQRS contribuye al mejoramiento institucional, a la prevención de riesgos disciplinarios y a la consolidación de una cultura de transparencia. Para la CGR, su gestión oportuna es un componente estratégico del control ciudadano.","opts":{"A":"Limita la participación ciudadana.","B":"Sustituye la auditoría fiscal.","C":"Fortalece la transparencia y el mejoramiento institucional.","D":"Genera cargas innecesarias."},"ans":"C","just":"La gestión de PQRS fortalece la relación Estado–ciudadano."},{"id":61,"comp":"Competencias Funcionales Generales","tema":"Gestión Documental","txt":"La gestión documental en las entidades públicas es una función transversal que garantiza la organización, conservación, disponibilidad y acceso a la información. Para la CGR, una adecuada gestión documental es esencial para soportar procesos de auditoría, control fiscal y rendición de cuentas, asegurando trazabilidad y transparencia en las actuaciones administrativas.","opts":{"A":"Se limita al archivo histórico.","B":"Es una función exclusiva del área de archivo.","C":"Garantiza organización, conservación y acceso a la información institucional.","D":"Sustituye los sistemas de información."},"ans":"C","just":"La gestión documental asegura trazabilidad y acceso a la información pública."},{"id":62,"comp":"Competencias Funcionales Generales","tema":"Gestión Documental","txt":"El ciclo vital del documento comprende las etapas por las que atraviesa un documento desde su producción hasta su disposición final. Conocer este ciclo permite a los servidores públicos aplicar correctamente los tiempos de retención y conservación documental.","opts":{"A":"Se limita a la creación del documento.","B":"Aplica solo a documentos electrónicos.","C":"Incluye producción, gestión, consulta y disposición final.","D":"Elimina la valoración documental."},"ans":"C","just":"El ciclo vital del documento es principio básico archivístico."},{"id":63,"comp":"Competencias Funcionales Generales","tema":"Gestión Documental","txt":"Las Tablas de Retención Documental (TRD) son instrumentos archivísticos que establecen los tiempos de permanencia de los documentos en cada fase del archivo. En la CGR, su aplicación garantiza organización, conservación adecuada y eliminación controlada de documentos.","opts":{"A":"Son listas informativas sin carácter obligatorio.","B":"Sustituyen los inventarios documentales.","C":"Definen tiempos de retención y disposición final de documentos.","D":"Aplican solo a archivos históricos."},"ans":"C","just":"Las TRD regulan la conservación y eliminación documental."},{"id":64,"comp":"Competencias Funcionales Generales","tema":"Gestión Documental","txt":"El Archivo de Gestión es aquel donde se conservan los documentos en trámite o de uso frecuente. Su adecuada organización permite una gestión administrativa eficiente y el acceso oportuno a la información requerida por los procesos de control fiscal.","opts":{"A":"Conserva exclusivamente documentos históricos.","B":"Es el archivo central de la entidad.","C":"Almacena documentos activos de uso frecuente.","D":"Se utiliza solo para documentos digitales."},"ans":"C","just":"El archivo de gestión concentra documentos activos."},{"id":65,"comp":"Competencias Funcionales Generales","tema":"Gestión Documental","txt":"El Archivo Central recibe los documentos transferidos desde los archivos de gestión una vez finalizada su frecuencia de uso. Su función es garantizar conservación, consulta controlada y preparación para la disposición final.","opts":{"A":"Sustituye el archivo histórico.","B":"Elimina documentos sin valoración.","C":"Conserva documentos semiactivos transferidos.","D":"Solo almacena documentos electrónicos."},"ans":"C","just":"El archivo central cumple función intermedia en el ciclo documental."},{"id":66,"comp":"Competencias Funcionales Generales","tema":"Gestión Documental","txt":"El Archivo Histórico conserva documentos con valor permanente por su importancia administrativa, jurídica, fiscal, histórica o cultural. Para la CGR, estos documentos constituyen memoria institucional y respaldo de la gestión pública.","opts":{"A":"Conserva documentos de uso cotidiano.","B":"Aplica únicamente a archivos privados.","C":"Conserva documentos con valor permanente.","D":"Elimina documentos sin criterio técnico."},"ans":"C","just":"El archivo histórico preserva la memoria institucional."},{"id":67,"comp":"Competencias Funcionales Generales","tema":"Gestión Documental","txt":"La valoración documental es un proceso técnico que determina los valores primarios y secundarios de los documentos, permitiendo decidir su conservación o eliminación. Este proceso es fundamental para la racionalización documental en las entidades públicas.","opts":{"A":"Se realiza de manera discrecional.","B":"Elimina documentos sin análisis previo.","C":"Determina el tiempo de conservación y disposición final.","D":"Sustituye las TRD."},"ans":"C","just":"La valoración documental guía la disposición final de documentos."},{"id":68,"comp":"Competencias Funcionales Generales","tema":"Gestión Documental","txt":"La gestión documental electrónica exige aplicar los mismos principios archivísticos que a los documentos físicos, garantizando autenticidad, integridad, disponibilidad y conservación a largo plazo.","opts":{"A":"Exime del uso de TRD.","B":"No requiere control archivístico.","C":"Garantiza autenticidad e integridad de la información.","D":"Sustituye el archivo físico sin control."},"ans":"C","just":"Los documentos electrónicos deben cumplir principios archivísticos."},{"id":69,"comp":"Competencias Funcionales Generales","tema":"Gestión Documental","txt":"El acceso a la información pública es un derecho fundamental y se apoya en una adecuada gestión documental. La correcta organización de archivos permite responder oportunamente a solicitudes ciudadanas y requerimientos de control.","opts":{"A":"Justifica la reserva total de documentos.","B":"Limita la transparencia institucional.","C":"Facilita el ejercicio del derecho de acceso a la información.","D":"Aplica solo a documentos históricos."},"ans":"C","just":"Una buena gestión documental garantiza acceso a la información."},{"id":70,"comp":"Competencias Funcionales Generales","tema":"Gestión Documental","txt":"La gestión documental contribuye a la eficiencia administrativa, la transparencia y el control fiscal. Para la CGR, es un instrumento estratégico que soporta auditorías, investigaciones fiscales y la rendición de cuentas institucional.","opts":{"A":"Es un proceso meramente operativo.","B":"Sustituye el control fiscal.","C":"Soporta auditorías, control fiscal y rendición de cuentas.","D":"Carece de valor estratégico."},"ans":"C","just":"La gestión documental es soporte del control fiscal."},{"id":71,"comp":"Competencias Funcionales Generales","tema":"Estatuto Anticorrupción","txt":"El Estatuto Anticorrupción constituye el principal marco normativo para la prevención, investigación y sanción de conductas corruptas en la administración pública. Para la CGR, su aplicación fortalece el control fiscal, la transparencia y la responsabilidad en la gestión de los recursos públicos, articulando acciones de control disciplinario, penal y fiscal.","opts":{"A":"Un régimen aplicable solo a servidores del nivel nacional.","B":"Una norma de carácter declarativo sin efectos jurídicos.","C":"Un marco integral para prevenir y sancionar actos de corrupción.","D":"Un código interno de buenas prácticas."},"ans":"C","just":"La Ley 1474 de 2011 establece el Estatuto Anticorrupción."},{"id":72,"comp":"Competencias Funcionales Generales","tema":"Estatuto Anticorrupción","txt":"El Estatuto Anticorrupción fortalece los mecanismos de control sobre la contratación estatal, estableciendo medidas para prevenir riesgos de corrupción desde la etapa precontractual hasta la ejecución y liquidación de los contratos. Estas medidas son insumo clave para el ejercicio del control fiscal.","opts":{"A":"Elimina controles en la contratación pública.","B":"Aplica únicamente a contratos privados.","C":"Refuerza controles y transparencia en la contratación estatal.","D":"Sustituye el Estatuto General de Contratación."},"ans":"C","just":"La Ley 1474 introduce medidas anticorrupción en contratación estatal."},{"id":73,"comp":"Competencias Funcionales Generales","tema":"Estatuto Anticorrupción","txt":"La obligación de implementar planes anticorrupción y de atención al ciudadano en las entidades públicas busca identificar, gestionar y mitigar riesgos de corrupción, fortaleciendo la integridad institucional y la rendición de cuentas.","opts":{"A":"Es voluntaria para las entidades públicas.","B":"Aplica solo a entidades del sector privado.","C":"Es obligatoria para las entidades públicas.","D":"Sustituye los sistemas de control interno."},"ans":"C","just":"La Ley 1474 obliga a adoptar planes anticorrupción."},{"id":74,"comp":"Competencias Funcionales Generales","tema":"Estatuto Anticorrupción","txt":"El Estatuto Anticorrupción amplía las capacidades de los órganos de control para investigar y sancionar conductas que afecten el patrimonio público. En este contexto, la coordinación interinstitucional es fundamental para la eficacia del control del Estado.","opts":{"A":"Restringe la actuación de los órganos de control.","B":"Elimina la responsabilidad fiscal.","C":"Fortalece facultades de los órganos de control.","D":"Traslada funciones a particulares."},"ans":"C","just":"El Estatuto amplía competencias de control y sanción."},{"id":75,"comp":"Competencias Funcionales Generales","tema":"Estatuto Anticorrupción","txt":"La transparencia y el acceso a la información pública son principios reforzados por el Estatuto Anticorrupción. Su cumplimiento permite a los ciudadanos ejercer control social y a los órganos de control fortalecer la vigilancia de la gestión pública.","opts":{"A":"Limitan el acceso ciudadano a la información.","B":"Aplican solo a información financiera.","C":"Promueven el acceso a la información y el control social.","D":"Sustituyen el control fiscal."},"ans":"C","just":"La transparencia es eje del Estatuto Anticorrupción."},{"id":76,"comp":"Competencias Funcionales Generales","tema":"Estatuto Anticorrupción","txt":"La responsabilidad de los servidores públicos frente a actos de corrupción incluye consecuencias disciplinarias, fiscales y penales. Este enfoque integral busca desincentivar prácticas corruptas y proteger los recursos del Estado.","opts":{"A":"Solo genera consecuencias disciplinarias.","B":"Excluye la responsabilidad penal.","C":"Comprende responsabilidades disciplinarias, fiscales y penales.","D":"Aplica únicamente a particulares."},"ans":"C","just":"El Estatuto prevé responsabilidades múltiples frente a la corrupción."},{"id":77,"comp":"Competencias Funcionales Generales","tema":"Estatuto Anticorrupción","txt":"El fortalecimiento del control interno y la gestión del riesgo de corrupción son pilares del Estatuto Anticorrupción. Estos mecanismos permiten prevenir irregularidades y mejorar la eficiencia institucional.","opts":{"A":"Sustituyen el control fiscal externo.","B":"Eximen de responsabilidad fiscal.","C":"Previenen riesgos y fortalecen la gestión institucional.","D":"Eliminan auditorías."},"ans":"C","just":"La gestión del riesgo es enfoque preventivo anticorrupción."},{"id":78,"comp":"Competencias Funcionales Generales","tema":"Estatuto Anticorrupción","txt":"El Estatuto Anticorrupción promueve la participación ciudadana como mecanismo de prevención y denuncia de actos irregulares. La interacción con la ciudadanía fortalece la vigilancia del uso de los recursos públicos.","opts":{"A":"Limita denuncias ciudadanas.","B":"Excluye mecanismos de participación.","C":"Promueve la participación y denuncia ciudadana.","D":"Sustituye la acción judicial."},"ans":"C","just":"La participación ciudadana es eje del control anticorrupción."},{"id":79,"comp":"Competencias Funcionales Generales","tema":"Estatuto Anticorrupción","txt":"Las medidas anticorrupción buscan no solo sancionar conductas irregulares, sino generar una cultura de integridad y ética pública en la administración, alineada con los valores institucionales de la CGR.","opts":{"A":"Se enfocan únicamente en sanciones.","B":"Eliminan la función preventiva.","C":"Promueven una cultura de integridad y ética pública.","D":"Son irrelevantes para el control fiscal."},"ans":"C","just":"El Estatuto tiene enfoque preventivo y cultural."},{"id":80,"comp":"Competencias Funcionales Generales","tema":"Estatuto Anticorrupción","txt":"La aplicación efectiva del Estatuto Anticorrupción en la CGR contribuye a fortalecer la confianza ciudadana, prevenir el detrimento patrimonial y consolidar el Estado Social de Derecho.","opts":{"A":"genera cargas administrativas sin impacto.","B":"Limita el control fiscal.","C":"Fortalece la confianza y protege el patrimonio público.","D":"Sustituye la Constitución."},"ans":"C","just":"La correcta aplicación refuerza el Estado Social de Derecho."},{"id":81,"comp":"Competencias Funcionales Generales","tema":"Código General Disciplinario","txt":"El Código General Disciplinario establece el régimen aplicable a los servidores públicos y particulares que ejerzan funciones públicas, con el propósito de proteger la función administrativa y los principios que la orientan. Para la CGR, su correcta aplicación es esencial para preservar la ética pública y la adecuada gestión del control fiscal.","opts":{"A":"Aplica únicamente a empleados del sector privado.","B":"Regula solo faltas administrativas leves.","C":"Regula el régimen disciplinario de servidores públicos y particulares con funciones públicas.","D":"Sustituye la Constitución Política."},"ans":"C","just":"La Ley 1952 de 2019 regula el régimen disciplinario."},{"id":82,"comp":"Competencias Funcionales Generales","tema":"Código General Disciplinario","txt":"El principio de legalidad en materia disciplinaria exige que las faltas y sanciones estén previamente establecidas en la ley. Este principio garantiza seguridad jurídica y limita el ejercicio del poder sancionador del Estado.","opts":{"A":"Permite sancionar por analogía.","B":"Autoriza sanciones discrecionales.","C":"Exige tipicidad previa de faltas y sanciones.","D":"Elimina la responsabilidad disciplinaria."},"ans":"C","just":"El principio de legalidad rige el derecho disciplinario."},{"id":83,"comp":"Competencias Funcionales Generales","tema":"Código General Disciplinario","txt":"La ilicitud sustancial es un concepto central del Código General Disciplinario y se configura cuando la conducta del servidor público afecta de manera injustificada el deber funcional. Este criterio evita sanciones meramente formales.","opts":{"A":"Se configura con cualquier irregularidad formal.","B":"Sustituye el análisis de tipicidad.","C":"Exige afectación sustancial del deber funcional.","D":"Elimina la culpabilidad."},"ans":"C","just":"La ilicitud sustancial es elemento esencial de la falta."},{"id":84,"comp":"Competencias Funcionales Generales","tema":"Código General Disciplinario","txt":"El principio de culpabilidad establece que solo se puede sancionar disciplinariamente al servidor cuando su conducta sea dolosa o culposa. Este principio excluye la responsabilidad objetiva en materia disciplinaria.","opts":{"A":"Permite sancionar sin analizar intención.","B":"Autoriza sanciones automáticas.","C":"Exige dolo o culpa para la sanción.","D":"Elimina el análisis de responsabilidad."},"ans":"C","just":"La culpabilidad es presupuesto de la responsabilidad disciplinaria."},{"id":85,"comp":"Competencias Funcionales Generales","tema":"Código General Disciplinario","txt":"Las faltas disciplinarias se clasifican según su gravedad en leves, graves y gravísimas, atendiendo criterios como el grado de afectación del servicio y la jerarquía del servidor. Esta clasificación incide directamente en la imposición de sanciones.","opts":{"A":"No influye en la sanción.","B":"Aplica solo a faltas gravísimas.","C":"Determina el tipo de sanción aplicable.","D":"Elimina la proporcionalidad."},"ans":"C","just":"La clasificación de faltas orienta la graduación de sanciones."},{"id":86,"comp":"Competencias Funcionales Generales","tema":"Código General Disciplinario","txt":"El debido proceso disciplinario garantiza al investigado el derecho a la defensa, contradicción y presunción de inocencia. Su respeto es obligatorio en todas las actuaciones disciplinarias adelantadas por las autoridades competentes.","opts":{"A":"Es opcional según la entidad.","B":"Se limita a la etapa sancionatoria.","C":"Garantiza defensa, contradicción y presunción de inocencia.","D":"Puede omitirse por celeridad."},"ans":"C","just":"El debido proceso disciplinario es garantía constitucional."},{"id":87,"comp":"Competencias Funcionales Generales","tema":"Código General Disciplinario","txt":"Las sanciones disciplinarias tienen finalidad preventiva, correctiva y pedagógica, orientadas a garantizar la correcta función pública y la observancia de los deberes funcionales.","opts":{"A":"Tienen únicamente carácter punitivo.","B":"Sustituyen la responsabilidad fiscal.","C":"Buscan prevenir y corregir conductas irregulares.","D":"Eliminan la función educativa."},"ans":"C","just":"La finalidad de la sanción disciplinaria es integral."},{"id":88,"comp":"Competencias Funcionales Generales","tema":"Código General Disciplinario","txt":"El control disciplinario interno es un mecanismo preventivo que permite a las entidades vigilar la conducta de sus servidores y corregir oportunamente desviaciones funcionales, fortaleciendo la integridad institucional.","opts":{"A":"Sustituye el control fiscal.","B":"Elimina la Procuraduría.","C":"Previene y corrige conductas irregulares.","D":"Aplica solo a particulares."},"ans":"C","just":"El control disciplinario interno fortalece la ética pública."},{"id":89,"comp":"Competencias Funcionales Generales","tema":"Código General Disciplinario","txt":"La acción disciplinaria es oficiosa y se ejerce con independencia de otras responsabilidades, como la fiscal o penal. Este principio garantiza la integralidad del control del Estado.","opts":{"A":"Depende de la acción penal.","B":"Se extingue con la fiscal.","C":"Es independiente de otras responsabilidades.","D":"Aplica solo a denuncias."},"ans":"C","just":"La acción disciplinaria es autónoma."},{"id":90,"comp":"Competencias Funcionales Generales","tema":"Código General Disciplinario","txt":"El cumplimiento del Código General Disciplinario por parte de los servidores de la CGR fortalece la confianza ciudadana, la integridad institucional y la correcta gestión del control fiscal.","opts":{"A":"Limita la autonomía funcional.","B":"Sustituye la Constitución.","C":"Fortalece la integridad y la confianza ciudadana.","D":"Genera cargas innecesarias."},"ans":"C","just":"La observancia disciplinaria refuerza la institucionalidad."},{"id":91,"comp":"Competencias Funcionales Generales","tema":"Ofimática","txt":"En el contexto de la CGR, las herramientas ofimáticas son esenciales para la producción de informes, matrices de auditoría y análisis de datos. El uso adecuado de estas herramientas contribuye a la eficiencia administrativa, la calidad de la información y la trazabilidad documental requerida en los procesos de control fiscal.","opts":{"A":"Son útiles solo para tareas básicas de digitación.","B":"Sustituyen el análisis técnico y jurídico.","C":"Facilitan la elaboración, análisis y gestión eficiente de información.","D":"Carecen de relevancia para el control fiscal."},"ans":"C","just":"La ofimática apoya la eficiencia y trazabilidad de la gestión pública."},{"id":92,"comp":"Competencias Funcionales Generales","tema":"Ofimática","txt":"En hojas de cálculo, el uso de fórmulas y funciones permite automatizar cálculos y análisis de información. Para la CGR, estas funcionalidades son clave en el manejo de matrices de seguimiento y evaluación fiscal.","opts":{"A":"Limita el análisis de información.","B":"Sustituye el control manual sin verificación.","C":"Permite automatizar cálculos y análisis de datos.","D":"Solo sirve para operaciones aritméticas simples."},"ans":"C","just":"Las fórmulas optimizan el análisis de información."},{"id":93,"comp":"Competencias Funcionales Generales","tema":"Ofimática","txt":"Las tablas dinámicas son herramientas que permiten resumir, analizar y presentar grandes volúmenes de información de manera eficiente. En la CGR, su uso facilita la identificación de tendencias y riesgos fiscales.","opts":{"A":"Limitan la visualización de datos.","B":"Reemplazan los sistemas de información.","C":"Permiten analizar grandes volúmenes de datos de manera resumida.","D":"Aplica solo a datos financieros externos."},"ans":"C","just":"Las tablas dinámicas facilitan el análisis de datos complejos."},{"id":94,"comp":"Competencias Funcionales Generales","tema":"Ofimática","txt":"El uso de procesadores de texto es fundamental para la elaboración de actos administrativos, informes técnicos y documentos oficiales. Una correcta configuración y uso de estilos contribuye a la uniformidad y presentación institucional.","opts":{"A":"Es irrelevante para documentos oficiales.","B":"Solo se usa para redactar borradores.","C":"Facilita la elaboración y estandarización de documentos oficiales.","D":"Sustituye los sistemas de gestión documental."},"ans":"C","just":"Los procesadores de texto apoyan la estandarización documental."},{"id":95,"comp":"Competencias Funcionales Generales","tema":"Ofimática","txt":"Las presentaciones digitales permiten comunicar resultados de auditoría y análisis institucional de manera clara y estructurada. En la CGR, son herramientas de apoyo para la socialización de hallazgos y decisiones.","opts":{"A":"Sustituyen el informe escrito.","B":"Carecen de valor institucional.","C":"Apoyan la comunicación clara de resultados y hallazgos.","D":"Eliminan el análisis técnico."},"ans":"C","just":"Las presentaciones fortalecen la comunicación institucional."},{"id":96,"comp":"Competencias Funcionales Generales","tema":"Ofimática","txt":"El uso adecuado de herramientas ofimáticas incluye la gestión correcta de archivos, carpetas y versiones, garantizando seguridad de la información y control documental en la entidad.","opts":{"A":"Permite duplicar información sin control.","B":"No tiene impacto en la seguridad.","C":"Garantiza organización, control y seguridad de la información.","D":"Sustituye la gestión documental."},"ans":"C","just":"La organización de archivos protege la información institucional."},{"id":97,"comp":"Competencias Funcionales Generales","tema":"Ofimática","txt":"Las herramientas colaborativas ofimáticas permiten el trabajo conjunto en documentos, hojas de cálculo y presentaciones, mejorando la productividad y coordinación institucional.","opts":{"A":"Generan conflictos de versiones.","B":"Eliminan la responsabilidad individual.","C":"Facilitan el trabajo colaborativo y la productividad.","D":"Sustituyen la validación técnica."},"ans":"C","just":"La colaboración digital optimiza procesos institucionales."},{"id":98,"comp":"Competencias Funcionales Generales","tema":"Ofimática","txt":"La protección de archivos mediante contraseñas y permisos es una práctica esencial para garantizar la confidencialidad y seguridad de la información institucional manejada por la CGR.","opts":{"A":"Es innecesaria en entidades públicas.","B":"Sustituye los controles de acceso.","C":"Garantiza la confidencialidad y seguridad de la información.","D":"Solo aplica a archivos personales."},"ans":"C","just":"La seguridad de la información es responsabilidad institucional."},{"id":99,"comp":"Competencias Funcionales Generales","tema":"Ofimática","txt":"El uso de gráficos en hojas de cálculo permite representar información de manera visual, facilitando la comprensión de resultados y tendencias en procesos de control fiscal.","opts":{"A":"Distorsiona la información.","B":"Sustituye el análisis numérico.","C":"Facilita la visualización e interpretación de datos.","D":"Aplica solo a informes financieros."},"ans":"C","just":"Los gráficos apoyan el análisis visual de la información."},{"id":100,"comp":"Competencias Funcionales Generales","tema":"Ofimática","txt":"El dominio de herramientas ofimáticas por parte del servidor público fortalece la eficiencia, calidad y oportunidad de la gestión institucional, siendo un soporte transversal para las funciones misionales de la CGR.","opts":{"A":"Carece de impacto en la gestión pública.","B":"Es una competencia opcional.","C":"Fortalece la eficiencia y calidad de la gestión institucional.","D":"Sustituye la formación profesional."},"ans":"C","just":"La ofimática es competencia clave para la gestión pública."},{"id":101,"comp":"Competencias Funcionales Generales","tema":"TIC","txt":"Las Tecnologías de la Información y las Comunicaciones (TIC) en la administración pública permiten optimizar procesos, mejorar la transparencia y fortalecer la gestión institucional. En la CGR, el uso adecuado de las TIC es fundamental para soportar auditorías, gestión documental, análisis de datos y rendición de cuentas.","opts":{"A":"Aplican solo a entidades privadas.","B":"Sustituyen el control fiscal.","C":"Optimizan procesos y fortalecen la transparencia y la gestión pública.","D":"Carecen de impacto institucional."},"ans":"C","just":"Las TIC son soporte estratégico de la gestión pública."},{"id":102,"comp":"Competencias Funcionales Generales","tema":"TIC","txt":"La seguridad de la información es un componente esencial de la gestión de las TIC en el sector público. Para la CGR, proteger la confidencialidad, integridad y disponibilidad de la información es una responsabilidad institucional.","opts":{"A":"Aplica solo a información personal.","B":"Elimina la necesidad de controles internos.","C":"Garantiza confidencialidad, integridad y disponibilidad de la información.","D":"Se limita al uso de contraseñas simples."},"ans":"C","just":"La seguridad de la información es un eje de la gestión TIC."},{"id":103,"comp":"Competencias Funcionales Generales","tema":"TIC","txt":"Los sistemas de información institucionales permiten recolectar, procesar y analizar datos para la toma de decisiones. En la CGR, estos sistemas apoyan el control fiscal, la planeación y el seguimiento a la gestión pública.","opts":{"A":"Sustituyen el análisis humano.","B":"Carecen de valor jurídico.","C":"Apoyan la toma de decisiones y el control fiscal.","D":"Aplican solo a áreas tecnológicas."},"ans":"C","just":"Los sistemas de información soportan decisiones institucionales."},{"id":104,"comp":"Competencias Funcionales Generales","tema":"TIC","txt":"La interoperabilidad entre sistemas de información del Estado permite el intercambio eficiente y seguro de datos entre entidades públicas, reduciendo duplicidades y fortaleciendo el control institucional.","opts":{"A":"Elimina la autonomía institucional.","B":"Limita el acceso a la información.","C":"Facilita el intercambio de información entre entidades públicas.","D":"Sustituye los archivos físicos."},"ans":"C","just":"La interoperabilidad fortalece la eficiencia del Estado."},{"id":105,"comp":"Competencias Funcionales Generales","tema":"TIC","txt":"El gobierno digital busca el uso estratégico de las TIC para mejorar la relación Estado–ciudadano, la eficiencia administrativa y la transparencia. Para la CGR, este enfoque moderniza los procesos de control y atención ciudadana.","opts":{"A":"Sustituye la función pública.","B":"Aplica solo a entidades territoriales.","C":"Mejora la eficiencia, transparencia y servicios al ciudadano.","D":"Elimina la gestión presencial."},"ans":"C","just":"El gobierno digital es política pública nacional."},{"id":106,"comp":"Competencias Funcionales Generales","tema":"TIC","txt":"El uso de plataformas electrónicas en la administración pública facilita la trazabilidad, el registro de actuaciones y el acceso a la información. En la CGR, estas plataformas respaldan procesos misionales y administrativos.","opts":{"A":"Elimina controles institucionales.","B":"Sustituye todas las actuaciones administrativas.","C":"Facilita trazabilidad y acceso a la información.","D":"Aplica solo a trámites internos."},"ans":"C","just":"Las plataformas electrónicas fortalecen la trazabilidad institucional."},{"id":107,"comp":"Competencias Funcionales Generales","tema":"TIC","txt":"La alfabetización digital de los servidores públicos es un requisito para el uso eficiente de las herramientas tecnológicas y la adecuada gestión de la información en la entidad.","opts":{"A":"Es opcional para servidores públicos.","B":"Aplica solo al área tecnológica.","C":"Permite uso adecuado y eficiente de herramientas TIC.","D":"Sustituye la formación profesional."},"ans":"C","just":"La alfabetización digital es clave para la gestión TIC."},{"id":108,"comp":"Competencias Funcionales Generales","tema":"TIC","txt":"El manejo ético y responsable de las TIC implica respetar normas de uso, protección de datos y confidencialidad de la información institucional, evitando riesgos de seguridad y uso indebido.","opts":{"A":"Permite uso libre sin restricciones.","B":"Aplica solo a información pública.","C":"Implica uso responsable y conforme a normas.","D":"Elimina la responsabilidad del servidor."},"ans":"C","just":"El uso ético de las TIC protege la información institucional."},{"id":109,"comp":"Competencias Funcionales Generales","tema":"TIC","txt":"La protección de datos personales en el uso de TIC es una obligación legal para las entidades públicas. La CGR debe garantizar el tratamiento adecuado de datos conforme a la normativa vigente.","opts":{"A":"Aplica solo a entidades privadas.","B":"Carece de consecuencias legales.","C":"Es una obligación legal en el sector público.","D":"Sustituye la gestión documental."},"ans":"C","just":"La protección de datos es mandato legal."},{"id":110,"comp":"Competencias Funcionales Generales","tema":"TIC","txt":"El uso estratégico de las TIC fortalece el control fiscal, la transparencia y la eficiencia institucional, consolidando una administración pública moderna y orientada a resultados.","opts":{"A":"Debilita el control fiscal.","B":"Genera dependencia tecnológica innecesaria.","C":"Fortalece el control fiscal y la transparencia.","D":"Sustituye la función de auditoría."},"ans":"C","just":"Las TIC son aliadas estratégicas del control fiscal."},{"id":111,"comp":"Competencias Funcionales Generales","tema":"MIPG","txt":"El Modelo Integrado de Planeación y Gestión – MIPG es el marco de referencia de la gestión pública en Colombia que articula la planeación, la gestión y la evaluación del desempeño institucional. Para la CGR, su aplicación permite evaluar la coherencia entre objetivos estratégicos, ejecución de recursos y resultados obtenidos.","opts":{"A":"Un modelo opcional de planeación interna.","B":"Un sistema exclusivo de control interno.","C":"Un marco integral que articula planeación, gestión y evaluación.","D":"Un instrumento únicamente presupuestal."},"ans":"C","just":"El MIPG integra planeación y gestión pública."},{"id":112,"comp":"Competencias Funcionales Generales","tema":"MIPG","txt":"El MIPG se estructura a partir de dimensiones que ordenan la gestión institucional y permiten orientar el mejoramiento continuo. Estas dimensiones facilitan la articulación entre políticas públicas, procesos y resultados en las entidades del Estado.","opts":{"A":"Se compone de una sola dimensión.","B":"Sustituye los sistemas de calidad.","C":"Se estructura en dimensiones que organizan la gestión pública.","D":"Elimina el control fiscal."},"ans":"C","just":"Las dimensiones del MIPG organizan la gestión institucional."},{"id":113,"comp":"Competencias Funcionales Generales","tema":"MIPG","txt":"La dimensión de Direccionamiento Estratégico y Planeación del MIPG orienta la definición de objetivos, metas e indicadores alineados con el Plan Nacional de Desarrollo y los planes institucionales. Este enfoque permite evaluar la coherencia de la gestión pública.","opts":{"A":"Se limita al manejo financiero.","B":"Elimina la planeación estratégica.","C":"Define objetivos y metas alineadas con planes de desarrollo.","D":"Aplica solo a entidades territoriales."},"ans":"C","just":"El direccionamiento estratégico es eje del MIPG."},{"id":114,"comp":"Competencias Funcionales Generales","tema":"MIPG","txt":"La dimensión de Gestión con Valores para Resultados del MIPG promueve una gestión pública orientada al logro de resultados con enfoque en integridad, legalidad y servicio al ciudadano.","opts":{"A":"Se centra solo en resultados financieros.","B":"Sustituye el control interno.","C":"Orienta la gestión con valores hacia resultados.","D":"Elimina la planeación institucional."},"ans":"C","just":"El MIPG integra valores y resultados."},{"id":115,"comp":"Competencias Funcionales Generales","tema":"MIPG","txt":"El Control Interno es una de las dimensiones del MIPG y tiene como finalidad proporcionar seguridad razonable sobre el logro de objetivos institucionales, la confiabilidad de la información y el cumplimiento normativo.","opts":{"A":"Elimina la necesidad de auditorías.","B":"Sustituye el control fiscal.","C":"Proporciona seguridad razonable sobre la gestión.","D":"Aplica solo a entidades privadas."},"ans":"C","just":"El control interno es componente esencial del MIPG."},{"id":116,"comp":"Competencias Funcionales Generales","tema":"MIPG","txt":"El seguimiento y evaluación en el MIPG permiten verificar el avance de los planes institucionales y la efectividad de las políticas públicas, facilitando la toma de decisiones basada en resultados y evidencias.","opts":{"A":"Se realiza de forma ocasional.","B":"Carece de impacto institucional.","C":"Permite evaluar avances y resultados de la gestión.","D":"Sustituye la planeación."},"ans":"C","just":"El seguimiento es clave para el mejoramiento continuo."},{"id":117,"comp":"Competencias Funcionales Generales","tema":"MIPG","txt":"La articulación entre MIPG y control fiscal permite evaluar no solo el cumplimiento normativo, sino la eficiencia, eficacia y efectividad del gasto público, fortaleciendo la vigilancia integral de la gestión estatal.","opts":{"A":"Limita el alcance del control fiscal.","B":"Sustituye la auditoría financiera.","C":"Fortalece la evaluación integral de la gestión pública.","D":"Elimina la responsabilidad fiscal."},"ans":"C","just":"MIPG y control fiscal son complementarios."},{"id":118,"comp":"Competencias Funcionales Generales","tema":"MIPG","txt":"La dimensión de Información y Comunicación del MIPG busca garantizar la calidad, oportunidad y accesibilidad de la información institucional, facilitando la transparencia y la rendición de cuentas.","opts":{"A":"Restringe el acceso a la información.","B":"Aplica solo a información financiera.","C":"Garantiza información oportuna y accesible.","D":"Sustituye la gestión documental."},"ans":"C","just":"La información es eje de la transparencia institucional."},{"id":119,"comp":"Competencias Funcionales Generales","tema":"MIPG","txt":"El talento humano es un eje transversal del MIPG y constituye un factor determinante para el logro de resultados institucionales, mediante el desarrollo de competencias, ética e integridad pública.","opts":{"A":"Es irrelevante para la gestión pública.","B":"Sustituye la planeación estratégica.","C":"Fortalece capacidades y desempeño institucional.","D":"Aplica solo a directivos."},"ans":"C","just":"El talento humano es pilar del MIPG."},{"id":120,"comp":"Competencias Funcionales Generales","tema":"MIPG","txt":"La aplicación efectiva del MIPG en las entidades públicas promueve el mejoramiento continuo, la transparencia y la gestión orientada a resultados, fortaleciendo la confianza ciudadana y el control institucional.","opts":{"A":"Genera solo cargas administrativas.","B":"Limita la autonomía institucional.","C":"Fortalece la gestión pública y la confianza ciudadana.","D":"Sustituye el control social."},"ans":"C","just":"El MIPG impulsa resultados, transparencia y confianza."},{"id":121,"comp":"Competencias Funcionales Específicas","tema":"Derecho Administrativo","txt":"El Derecho Administrativo regula la organización y la actividad de la administración pública, así como las relaciones entre el Estado y los particulares. Para un Profesional Universitario de la CGR, su conocimiento es esencial para analizar la legalidad de los actos administrativos y la gestión pública en el marco del control fiscal.","opts":{"A":"Regula únicamente relaciones entre particulares.","B":"Es exclusivo del Derecho Privado.","C":"Regula la actividad administrativa del Estado y sus relaciones con los particulares.","D":"Sustituye el Derecho Constitucional."},"ans":"C","just":"El Derecho Administrativo rige la función administrativa del Estado."},{"id":122,"comp":"Competencias Funcionales Específicas","tema":"Derecho Administrativo","txt":"El acto administrativo es la manifestación de voluntad de la administración que produce efectos jurídicos directos. En la CGR, su análisis permite evaluar la legalidad de decisiones que comprometen recursos públicos.","opts":{"A":"Es una opinión sin efectos jurídicos.","B":"Es un contrato estatal.","C":"Es una decisión unilateral que produce efectos jurídicos.","D":"Es un acto judicial."},"ans":"C","just":"El acto administrativo es expresión de la función administrativa."},{"id":123,"comp":"Competencias Funcionales Específicas","tema":"Derecho Administrativo","txt":"La motivación del acto administrativo garantiza la transparencia y el control de la actuación administrativa, permitiendo verificar su legalidad y razonabilidad. Su ausencia puede generar la nulidad del acto.","opts":{"A":"Es un requisito opcional.","B":"Aplica solo a actos sancionatorios.","C":"Permite conocer las razones jurídicas y fácticas del acto.","D":"Sustituye la notificación."},"ans":"C","just":"La motivación es elemento esencial del acto administrativo."},{"id":124,"comp":"Competencias Funcionales Específicas","tema":"Derecho Administrativo","txt":"El principio de legalidad administrativa exige que toda actuación de la administración esté fundada en la Constitución y la ley, evitando arbitrariedades y garantizando seguridad jurídica.","opts":{"A":"Autoriza actuaciones discrecionales absolutas.","B":"Permite actuar por analogía ilimitada.","C":"Somete la actuación administrativa al orden jurídico.","D":"Elimina el control judicial."},"ans":"C","just":"El principio de legalidad rige la función administrativa."},{"id":125,"comp":"Competencias Funcionales Específicas","tema":"Derecho Administrativo","txt":"El procedimiento administrativo es el conjunto de etapas que garantizan el debido proceso en las actuaciones de la administración. Su observancia es obligatoria para la validez de las decisiones administrativas.","opts":{"A":"Es una formalidad irrelevante.","B":"Aplica solo a procesos sancionatorios.","C":"Garantiza el debido proceso en la actuación administrativa.","D":"Sustituye el control judicial."},"ans":"C","just":"El procedimiento asegura legalidad y defensa."},{"id":126,"comp":"Competencias Funcionales Específicas","tema":"Derecho Administrativo","txt":"El silencio administrativo es una figura jurídica que asigna efectos a la falta de respuesta oportuna de la administración. Su aplicación protege los derechos de los administrados frente a la inactividad estatal.","opts":{"A":"Elimina la obligación de responder.","B":"Aplica solo a contratos estatales.","C":"Otorga efectos jurídicos a la falta de respuesta administrativa.","D":"Sustituye la notificación del acto."},"ans":"C","just":"El silencio administrativo protege al administrado."},{"id":127,"comp":"Competencias Funcionales Específicas","tema":"Derecho Administrativo","txt":"La revocatoria directa es el mecanismo mediante el cual la administración puede dejar sin efectos un acto administrativo en los casos previstos por la ley, respetando el debido proceso y los derechos adquiridos.","opts":{"A":"Permite eliminar cualquier acto sin límite.","B":"Sustituye la acción judicial.","C":"Permite retirar actos conforme a causales legales.","D":"Se ejerce solo por orden judicial."},"ans":"C","just":"La revocatoria directa está regulada por la ley."},{"id":128,"comp":"Competencias Funcionales Específicas","tema":"Derecho Administrativo","txt":"El control judicial de la actividad administrativa garantiza la sujeción de la administración al orden jurídico y la protección de los derechos de los ciudadanos frente a actuaciones irregulares.","opts":{"A":"Elimina la autonomía administrativa.","B":"Sustituye el control fiscal.","C":"Garantiza legalidad y protección de derechos.","D":"Aplica solo a actos legislativos."},"ans":"C","just":"El control judicial asegura la legalidad administrativa."},{"id":129,"comp":"Competencias Funcionales Específicas","tema":"Derecho Administrativo","txt":"Los recursos administrativos permiten a los ciudadanos controvertir decisiones de la administración antes de acudir a la jurisdicción, fortaleciendo el principio de autotutela administrativa.","opts":{"A":"Sustituyen la acción judicial definitivamente.","B":"Son opcionales para la administración.","C":"Permiten impugnar decisiones ante la propia administración.","D":"Aplican solo a actos de trámite."},"ans":"C","just":"Los recursos administrativos garantizan defensa."},{"id":130,"comp":"Competencias Funcionales Específicas","tema":"Derecho Administrativo","txt":"El conocimiento del Derecho Administrativo por parte del servidor público de la CGR permite evaluar la legalidad de la gestión pública, prevenir irregularidades y fortalecer el control fiscal en el Estado Social de Derecho.","opts":{"A":"No tiene relación con el control fiscal.","B":"Es irrelevante para la CGR.","C":"Fortalece la legalidad y el control fiscal.","D":"Sustituye la formación ética."},"ans":"C","just":"El Derecho Administrativo es base del control de legalidad."},{"id":131,"comp":"Competencias Funcionales Específicas","tema":"Contratación estatal","txt":"La contratación estatal es el conjunto de reglas y principios que regulan la celebración, ejecución y liquidación de los contratos por parte de las entidades públicas. Para la CGR, su análisis permite verificar la legalidad, eficiencia y transparencia en el uso de los recursos públicos comprometidos en los contratos.","opts":{"A":"Se rige exclusivamente por el derecho privado.","B":"Solo aplica a contratos de obra.","C":"Regula la actividad contractual de las entidades públicas.","D":"Sustituye la función administrativa."},"ans":"C","just":"La contratación estatal se rige por normas de derecho público."},{"id":132,"comp":"Competencias Funcionales Específicas","tema":"Contratación estatal","txt":"Los principios de la contratación estatal orientan todas las etapas contractuales y garantizan la transparencia, economía, responsabilidad y selección objetiva del contratista. Estos principios son criterios fundamentales de evaluación para el control fiscal.","opts":{"A":"Son recomendaciones sin obligatoriedad.","B":"Aplican solo a la etapa precontractual.","C":"Orientan todas las etapas del contrato y son obligatorios.","D":"Sustituyen los pliegos de condiciones."},"ans":"C","just":"Los principios contractuales son de obligatorio cumplimiento."},{"id":133,"comp":"Competencias Funcionales Específicas","tema":"Contratación estatal","txt":"La selección objetiva del contratista exige que la decisión se base en criterios previamente establecidos, verificables y relacionados con el objeto contractual, evitando favoritismos y garantizando igualdad de oportunidades.","opts":{"A":"Permite discrecionalidad absoluta.","B":"Prioriza la experiencia subjetiva.","C":"Exige criterios claros y verificables.","D":"Elimina la competencia."},"ans":"C","just":"L
