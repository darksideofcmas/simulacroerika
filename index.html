a selección objetiva garantiza transparencia."},{"id":134,"comp":"Competencias Funcionales Específicas","tema":"Contratación estatal","txt":"La etapa precontractual comprende las actuaciones previas a la celebración del contrato, como planeación, estudios previos y selección del contratista. Una adecuada planeación previene riesgos fiscales y jurídicos.","opts":{"A":"Inicia con la firma del contrato.","B":"Aplica solo a contratos menores.","C":"Comprende planeación y selección previa.","D":"Carece de impacto fiscal."},"ans":"C","just":"La planeación es base de la contratación estatal."},{"id":135,"comp":"Competencias Funcionales Específicas","tema":"Contratación estatal","txt":"El contrato estatal es el acuerdo de voluntades celebrado por una entidad pública para cumplir fines estatales. Su ejecución debe ajustarse a las cláusulas pactadas y a los principios de la función administrativa.","opts":{"A":"No produce efectos jurídicos.","B":"Equivale a un acto legislativo.","C":"Es un acuerdo de voluntades con fines estatales.","D":"Se rige exclusivamente por el derecho privado."},"ans":"C","just":"El contrato estatal tiene naturaleza administrativa."},{"id":136,"comp":"Competencias Funcionales Específicas","tema":"Contratación estatal","txt":"La ejecución del contrato estatal debe garantizar el cumplimiento del objeto contratado en condiciones de eficiencia, eficacia y calidad, protegiendo los recursos públicos comprometidos.","opts":{"A":"Permite modificaciones sin soporte legal.","B":"Se limita a la firma del contrato.","C":"Exige control y seguimiento durante la ejecución.","D":"Elimina la supervisión e interventoría."},"ans":"C","just":"El seguimiento contractual protege los recursos públicos."},{"id":137,"comp":"Competencias Funcionales Específicas","tema":"Contratación estatal","txt":"La supervisión e interventoría son mecanismos de control contractual que buscan verificar el cumplimiento de las obligaciones contractuales. Su adecuada aplicación reduce riesgos de detrimento patrimonial.","opts":{"A":"Sustituyen el control fiscal.","B":"No tienen efectos jurídicos.","C":"Verifican cumplimiento de obligaciones contractuales.","D":"Aplican solo a contratos de consultoría."},"ans":"C","just":"La supervisión e interventoría previenen riesgos contractuales."},{"id":138,"comp":"Competencias Funcionales Específicas","tema":"Contratación estatal","txt":"Las modificaciones contractuales deben realizarse dentro del marco legal, justificar su necesidad y conservar el equilibrio económico del contrato, evitando irregularidades fiscales.","opts":{"A":"Pueden realizarse sin límite.","B":"No requieren justificación.","C":"Deben justificarse y respetar el marco legal.","D":"Eliminan la planeación contractual."},"ans":"C","just":"Las modificaciones deben ser legales y justificadas."},{"id":139,"comp":"Competencias Funcionales Específicas","tema":"Contratación estatal","txt":"La liquidación del contrato estatal permite verificar el cumplimiento de las obligaciones y cerrar definitivamente la relación contractual, siendo una etapa clave para el control fiscal.","opts":{"A":"Es opcional para contratos estatales.","B":"Aplica solo a contratos de obra.","C":"Permite verificar cumplimiento y cerrar el contrato.","D":"Sustituye la ejecución contractual."},"ans":"C","just":"La liquidación contractual protege el patrimonio público."},{"id":140,"comp":"Competencias Funcionales Específicas","tema":"Contratación estatal","txt":"El análisis de la contratación estatal por parte de la CGR busca prevenir el detrimento patrimonial, garantizar la transparencia y fortalecer la confianza ciudadana en la gestión pública.","opts":{"A":"Limita la autonomía contractual.","B":"Sustituye la gestión administrativa.","C":"Fortalece la transparencia y protección del patrimonio público.","D":"Es una actividad meramente formal."},"ans":"C","just":"El control a la contratación protege el interés general."},{"id":141,"comp":"Competencias Funcionales Específicas","tema":"Hacienda Pública","txt":"La Hacienda Pública comprende el conjunto de recursos, ingresos, gastos y normas que regulan la actividad financiera del Estado. Para la CGR, su análisis es fundamental para evaluar la legalidad, eficiencia y sostenibilidad del manejo de los recursos públicos en cumplimiento de los fines estatales.","opts":{"A":"Se limita a la contabilidad privada.","B":"Es exclusiva del sector financiero.","C":"Regula la gestión de ingresos y gastos del Estado.","D":"Sustituye el control fiscal."},"ans":"C","just":"La Hacienda Pública regula la actividad financiera estatal."},{"id":142,"comp":"Competencias Funcionales Específicas","tema":"Hacienda Pública","txt":"El principio de legalidad del gasto público exige que toda erogación se encuentre prevista en el presupuesto y autorizada por la ley, evitando el uso arbitrario de los recursos estatales.","opts":{"A":"Permite gastos discrecionales.","B":"Autoriza gastos sin apropiación presupuestal.","C":"Exige autorización legal y presupuestal del gasto.","D":"Elimina el control presupuestal."},"ans":"C","just":"El gasto público debe estar autorizado legalmente."},{"id":143,"comp":"Competencias Funcionales Específicas","tema":"Hacienda Pública","txt":"El presupuesto público es el principal instrumento de planificación financiera del Estado y refleja la programación de ingresos y gastos para el cumplimiento de las políticas públicas y planes de desarrollo.","opts":{"A":"Es un documento contable sin efectos jurídicos.","B":"Aplica solo al nivel nacional.","C":"Programa ingresos y gastos del Estado.","D":"Sustituye el plan de desarrollo."},"ans":"C","just":"El presupuesto orienta la gestión financiera pública."},{"id":144,"comp":"Competencias Funcionales Específicas","tema":"Hacienda Pública","txt":"Los ingresos públicos se clasifican según su origen y naturaleza, permitiendo identificar las fuentes de financiación del Estado y evaluar su sostenibilidad fiscal. Para la CGR, esta clasificación es clave en la vigilancia de recursos.","opts":{"A":"Carecen de clasificación normativa.","B":"Son exclusivamente tributarios.","C":"Se clasifican según origen y naturaleza.","D":"Sustituyen el gasto público."},"ans":"C","just":"La clasificación de ingresos permite control fiscal efectivo."},{"id":145,"comp":"Competencias Funcionales Específicas","tema":"Hacienda Pública","txt":"El gasto público debe responder a criterios de eficiencia, eficacia y economía, orientándose al cumplimiento de los fines del Estado y la satisfacción de las necesidades colectivas.","opts":{"A":"Prioriza intereses particulares.","B":"Carece de control posterior.","C":"Debe orientarse a fines del Estado con criterios de eficiencia.","D":"Es autónomo frente al presupuesto."},"ans":"C","just":"El gasto público debe ser eficiente y finalista."},{"id":146,"comp":"Competencias Funcionales Específicas","tema":"Hacienda Pública","txt":"El principio de sostenibilidad fiscal orienta la gestión de las finanzas públicas buscando equilibrio entre ingresos y gastos, garantizando estabilidad macroeconómica y bienestar social.","opts":{"A":"Autoriza déficit ilimitados.","B":"Sustituye el control político.","C":"Busca equilibrio y responsabilidad fiscal.","D":"Elimina la inversión social."},"ans":"C","just":"La sostenibilidad fiscal es criterio constitucional."},{"id":147,"comp":"Competencias Funcionales Específicas","tema":"Hacienda Pública","txt":"La deuda pública es un instrumento de financiación del Estado cuya gestión debe ajustarse a criterios de legalidad, necesidad y sostenibilidad, evitando riesgos fiscales.","opts":{"A":"Aplica solo al sector privado.","B":"Carece de regulación legal.","C":"Es un mecanismo de financiación sujeto a control.","D":"Elimina el presupuesto."},"ans":"C","just":"La deuda pública debe ser controlada y sostenible."},{"id":148,"comp":"Competencias Funcionales Específicas","tema":"Hacienda Pública","txt":"El sistema presupuestal integra la planeación, programación, ejecución y control del presupuesto público, permitiendo la evaluación integral de la gestión financiera del Estado.","opts":{"A":"Funciona de manera aislada.","B":"Excluye el control fiscal.","C":"Integra planeación, ejecución y control presupuestal.","D":"Sustituye la contabilidad pública."},"ans":"C","just":"El sistema presupuestal permite control integral del gasto."},{"id":149,"comp":"Competencias Funcionales Específicas","tema":"Hacienda Pública","txt":"La vigilancia de la Hacienda Pública por parte de la CGR busca prevenir el detrimento patrimonial y garantizar el uso legal y eficiente de los recursos estatales.","opts":{"A":"Limita la autonomía financiera.","B":"Sustituye la planeación fiscal.","C":"Protege el patrimonio público.","D":"Es un trámite formal."},"ans":"C","just":"El control fiscal protege la Hacienda Pública."},{"id":150,"comp":"Competencias Funcionales Específicas","tema":"Hacienda Pública","txt":"El conocimiento de la Hacienda Pública permite al servidor público de la CGR analizar la gestión financiera estatal, identificar riesgos fiscales y fortalecer el control fiscal dentro del Estado Social de Derecho.","opts":{"A":"No incide en el control fiscal.","B":"Es irrelevante para la CGR.","C":"Fortalece el análisis y vigilancia de la gestión financiera.","D":"Sustituye la formación ética."},"ans":"C","just":"La Hacienda Pública es base del control fiscal."},{"id":151,"comp":"Competencias Funcionales Específicas","tema":"Proyectos","txt":"La formulación de proyectos públicos permite identificar problemas, definir objetivos y seleccionar alternativas para la inversión de recursos públicos. Para la CGR, una adecuada formulación es clave para prevenir riesgos fiscales y evaluar la viabilidad de las inversiones estatales.","opts":{"A":"Se limita a la ejecución presupuestal.","B":"Aplica solo al sector privado.","C":"Define problemas, objetivos y alternativas de inversión.","D":"Sustituye la evaluación fiscal."},"ans":"C","just":"La formulación adecuada previene riesgos fiscales."},{"id":152,"comp":"Competencias Funcionales Específicas","tema":"Proyectos","txt":"La fase de ejecución del proyecto corresponde a la materialización de las actividades planificadas, garantizando el cumplimiento de los objetivos, cronogramas y presupuestos establecidos.","opts":{"A":"Inicia en la formulación.","B":"No requiere seguimiento.","C":"Implanta las actividades planificadas.","D":"Elimina la evaluación del proyecto."},"ans":"C","just":"La ejecución convierte la planeación en resultados."},{"id":153,"comp":"Competencias Funcionales Específicas","tema":"Proyectos","txt":"El seguimiento y control de proyectos permiten verificar avances físicos y financieros, identificar desviaciones y adoptar medidas correctivas oportunas, protegiendo los recursos públicos comprometidos.","opts":{"A":"Es innecesario si el proyecto está contratado.","B":"Aplica solo al cierre del proyecto.","C":"Permite identificar desviaciones y aplicar correctivos.","D":"Sustituye la ejecución."},"ans":"C","just":"El seguimiento previene sobrecostos e incumplimientos."},{"id":154,"comp":"Competencias Funcionales Específicas","tema":"Proyectos","txt":"La evaluación de proyectos permite medir el grado de cumplimiento de objetivos, los impactos generados y la eficiencia en el uso de los recursos públicos, siendo una herramienta fundamental para el control fiscal.","opts":{"A":"Se limita al control financiero.","B":"Elimina la planeación futura.","C":"Mide cumplimiento, impacto y eficiencia.","D":"Es irrelevante para la CGR."},"ans":"C","just":"La evaluación fortalece la gestión por resultados."},{"id":155,"comp":"Competencias Funcionales Específicas","tema":"Proyectos","txt":"Los indicadores de gestión en proyectos permiten cuantificar avances, resultados e impactos, facilitando la toma de decisiones y el seguimiento efectivo de la inversión pública.","opts":{"A":"Son opcionales en proyectos públicos.","B":"Sustituyen la planificación.","C":"Permiten medir avances y resultados.","D":"Aplican solo al sector privado."},"ans":"C","just":"Los indicadores son clave para el seguimiento de proyectos."},{"id":156,"comp":"Competencias Funcionales Específicas","tema":"Proyectos","txt":"El análisis de riesgos en proyectos públicos permite identificar amenazas que pueden afectar el cumplimiento de objetivos, costos y plazos, facilitando la adopción de medidas preventivas.","opts":{"A":"Elimina la necesidad de seguimiento.","B":"Aplica solo a proyectos privados.","C":"Identifica riesgos y permite su mitigación.","D":"Sustituye el control fiscal."},"ans":"C","just":"La gestión del riesgo previene fallas en proyectos."},{"id":157,"comp":"Competencias Funcionales Específicas","tema":"Proyectos","txt":"La articulación de proyectos con los planes de desarrollo garantiza coherencia entre la inversión pública y las prioridades de política pública, criterio relevante para la evaluación fiscal.","opts":{"A":"Elimina la planeación.","B":"Sustituye la evaluación posterior.","C":"Garantiza coherencia con planes de desarrollo.","D":"Carece de relevancia fiscal."},"ans":"C","just":"La coherencia con planes es requisito de inversión pública."},{"id":158,"comp":"Competencias Funcionales Específicas","tema":"Proyectos","txt":"El cierre de proyectos implica la verificación de cumplimiento del objeto, la liquidación financiera y la evaluación final de resultados, asegurando transparencia y cierre adecuado de la gestión pública.","opts":{"A":"Ocurre al inicio del proyecto.","B":"Es irrelevante para la CGR.","C":"Verifica cumplimiento y realiza cierre financiero.","D":"Sustituye la ejecución."},"ans":"C","just":"El cierre asegura transparencia y rendición de cuentas."},{"id":159,"comp":"Competencias Funcionales Específicas","tema":"Proyectos","txt":"La trazabilidad documental en proyectos públicos es esencial para soportar decisiones, auditorías y evaluaciones, permitiendo verificar el uso adecuado de los recursos comprometidos.","opts":{"A":"Aplica solo a contratos privados.","B":"Es irrelevante para el control fiscal.","C":"Permite verificar uso y decisiones en proyectos.","D":"Sustituye la supervisión."},"ans":"C","just":"La trazabilidad respalda el control fiscal."},{"id":160,"comp":"Competencias Funcionales Específicas","tema":"Proyectos","txt":"El conocimiento en formulación, ejecución y evaluación de proyectos fortalece la capacidad del servidor público de la CGR para analizar inversiones públicas, identificar riesgos fiscales y contribuir al mejoramiento de la gestión estatal.","opts":{"A":"No incide en el control fiscal.","B":"Es exclusivo de áreas técnicas.","C":"Fortalece el control y la evaluación de la inversión pública.","D":"Sustituye la formación jurídica."},"ans":"C","just":"Los proyectos públicos son eje del control fiscal."},{"id":161,"comp":"Competencias Funcionales Específicas","tema":"Contabilidad pública","txt":"La contabilidad pública es el sistema que permite registrar, procesar y revelar los hechos económicos de las entidades del Estado, garantizando información financiera confiable, oportuna y útil para la toma de decisiones y el control fiscal que ejerce la CGR.","opts":{"A":"Se limita al registro presupuestal.","B":"Aplica solo a entidades privadas.","C":"Registra y revela los hechos económicos del sector público.","D":"Sustituye el control fiscal."},"ans":"C","just":"La contabilidad pública proporciona información para el control fiscal."},{"id":162,"comp":"Competencias Funcionales Específicas","tema":"Contabilidad pública","txt":"El principio de devengo en la contabilidad pública implica que los hechos económicos se reconocen cuando ocurren y no cuando se recibe o paga efectivo, permitiendo una representación fiel de la situación financiera del Estado.","opts":{"A":"Reconoce hechos solo cuando hay flujo de caja.","B":"Aplica únicamente al sector privado.","C":"Reconoce los hechos cuando ocurren económicamente.","D":"Elimina el control presupuestal."},"ans":"C","just":"El principio de devengo garantiza información fiel."},{"id":163,"comp":"Competencias Funcionales Específicas","tema":"Contabilidad pública","txt":"El sistema de contabilidad pública en Colombia está a cargo de la Contaduría General de la Nación, entidad que establece las normas contables aplicables al sector público y consolida la información financiera del Estado.","opts":{"A":"Depende del Ministerio de Hacienda.","B":"Es competencia exclusiva de la CGR.","C":"Está a cargo de la Contaduría General de la Nación.","D":"Aplica solo a entidades territoriales."},"ans":"C","just":"La CGN regula la contabilidad pública."},{"id":164,"comp":"Competencias Funcionales Específicas","tema":"Contabilidad pública","txt":"Los estados financieros del sector público reflejan la situación financiera, los resultados de la operación y los flujos de efectivo, constituyéndose en insumo esencial para el análisis de la gestión fiscal.","opts":{"A":"Carecen de valor jurídico.","B":"Son exclusivos para fines internos.","C":"Permiten analizar la situación financiera del Estado.","D":"Sustituyen el presupuesto público."},"ans":"C","just":"Los estados financieros soportan el análisis fiscal."},{"id":165,"comp":"Competencias Funcionales Específicas","tema":"Contabilidad pública","txt":"El patrimonio público está conformado por el conjunto de bienes, derechos y obligaciones del Estado, cuya adecuada administración y registro contable es objeto de vigilancia por parte de la CGR.","opts":{"A":"Incluye solo bienes inmuebles.","B":"Carece de obligaciones.","C":"Comprende bienes, derechos y obligaciones del Estado.","D":"Es exclusivo del sector privado."},"ans":"C","just":"El patrimonio público debe ser protegido y controlado."},{"id":166,"comp":"Competencias Funcionales Específicas","tema":"Contabilidad pública","txt":"La conciliación contable permite verificar la consistencia entre los registros contables y otras fuentes de información, detectando errores o inconsistencias que pueden afectar la confiabilidad de los estados financieros.","opts":{"A":"Es un trámite opcional.","B":"Sustituye las auditorías.","C":"Garantiza consistencia y confiabilidad de la información contable.","D":"Elimina el control interno."},"ans":"C","just":"La conciliación mejora la calidad de la información financiera."},{"id":167,"comp":"Competencias Funcionales Específicas","tema":"Contabilidad pública","txt":"La revelación de la información contable implica presentar de manera clara y comprensible los hechos económicos relevantes, permitiendo la transparencia y el control ciudadano y fiscal sobre la gestión pública.","opts":{"A":"Limita el acceso a la información.","B":"Aplica solo a información reservada.","C":"Garantiza transparencia y comprensión de la información financiera.","D":"Sustituye la rendición de cuentas."},"ans":"C","just":"La revelación contable fortalece la transparencia."},{"id":168,"comp":"Competencias Funcionales Específicas","tema":"Contabilidad pública","txt":"El control contable es parte del sistema de control interno y busca asegurar la correcta aplicación de las normas contables, minimizando riesgos de error o fraude en la información financiera del sector público.","opts":{"A":"Elimina el control fiscal.","B":"Aplica solo a empresas privadas.","C":"Fortalece la confiabilidad de la información financiera.","D":"Sustituye la auditoría externa."},"ans":"C","just":"El control contable protege la información financiera pública."},{"id":169,"comp":"Competencias Funcionales Específicas","tema":"Contabilidad pública","txt":"La información contable sirve de base para la toma de decisiones de política pública, la planeación financiera y el ejercicio del control fiscal, garantizando un uso responsable de los recursos del Estado.","opts":{"A":"Carece de impacto en decisiones públicas.","B":"Es exclusiva del área contable.","C":"Apoya decisiones de planeación y control fiscal.","D":"Sustituye el análisis presupuestal."},"ans":"C","just":"La información contable orienta decisiones públicas."},{"id":170,"comp":"Competencias Funcionales Específicas","tema":"Contabilidad pública","txt":"El conocimiento de la contabilidad pública permite al servidor de la CGR identificar riesgos financieros, inconsistencias en la información y posibles afectaciones al patrimonio público, fortaleciendo el control fiscal integral.","opts":{"A":"No tiene relación con el control fiscal.","B":"Es irrelevante para la CGR.","C":"Fortalece el análisis financiero y el control fiscal.","D":"Sustituye la auditoría jurídica."},"ans":"C","just":"La contabilidad pública es pilar del control fiscal."},{"id":171,"comp":"Competencias Funcionales Específicas","tema":"Presupuesto público","txt":"El presupuesto público es el instrumento mediante el cual el Estado autoriza, programa y controla el uso de los recursos públicos durante una vigencia fiscal. Para la CGR, el análisis presupuestal es esencial para verificar la legalidad del gasto y la correcta ejecución financiera conforme a la ley.","opts":{"A":"Es un documento contable sin efectos jurídicos.","B":"Aplica solo al nivel nacional.","C":"Autoriza y controla la ejecución del gasto público.","D":"Sustituye la planeación institucional."},"ans":"C","just":"El presupuesto público tiene carácter legal y vinculante."},{"id":172,"comp":"Competencias Funcionales Específicas","tema":"Presupuesto público","txt":"El principio de anualidad presupuestal establece que el presupuesto rige por una vigencia fiscal determinada, garantizando control y planificación del gasto público dentro de límites temporales definidos.","opts":{"A":"Permite comprometer gasto sin límite temporal.","B":"Elimina la programación fiscal.","C":"Limita el presupuesto a una vigencia fiscal determinada.","D":"Sustituye el principio de legalidad."},"ans":"C","just":"El principio de anualidad asegura control del gasto."},{"id":173,"comp":"Competencias Funcionales Específicas","tema":"Presupuesto público","txt":"El principio de legalidad del presupuesto exige que tanto ingresos como gastos estén autorizados por normas con fuerza de ley, evitando la ejecución discrecional de recursos públicos.","opts":{"A":"Autoriza gasto sin respaldo normativo.","B":"Aplica solo a ingresos.","C":"Exige autorización legal para ingresos y gastos.","D":"Elimina el control fiscal."},"ans":"C","just":"La legalidad es principio rector del presupuesto."},{"id":174,"comp":"Competencias Funcionales Específicas","tema":"Presupuesto público","txt":"El Certificado de Disponibilidad Presupuestal (CDP) garantiza la existencia de apropiación presupuestal previa antes de adquirir compromisos que afecten el presupuesto público, previniendo riesgos fiscales.","opts":{"A":"Sustituye el registro presupuestal.","B":"Se expide después del compromiso.","C":"Asegura apropiación previa antes del compromiso.","D":"Aplica solo a gastos menores."},"ans":"C","just":"El CDP es requisito previo al compromiso."},{"id":175,"comp":"Competencias Funcionales Específicas","tema":"Presupuesto público","txt":"El Registro Presupuestal (RP) perfecciona el compromiso adquirido y afecta definitivamente la apropiación presupuestal, permitiendo el seguimiento y control del gasto público.","opts":{"A":"Sustituye el CDP.","B":"Se expide antes del compromiso.","C":"Afecta definitivamente la apropiación presupuestal.","D":"Elimina la ejecución presupuestal."},"ans":"C","just":"El RP materializa el compromiso presupuestal."},{"id":176,"comp":"Competencias Funcionales Específicas","tema":"Presupuesto público","txt":"La ejecución presupuestal comprende el recaudo de ingresos y la realización de gastos conforme a las autorizaciones presupuestales, siendo objeto de control fiscal por parte de la CGR.","opts":{"A":"Inicia con la formulación del presupuesto.","B":"Se limita al pago de obligaciones.","C":"Implica recaudo, compromiso y pago del gasto.","D":"Sustituye el control contable."},"ans":"C","just":"La ejecución presupuestal es núcleo del control fiscal."},{"id":177,"comp":"Competencias Funcionales Específicas","tema":"Presupuesto público","txt":"La modificación presupuestal es el mecanismo legal para ajustar el presupuesto durante la vigencia fiscal, respetando los procedimientos y límites establecidos por la ley.","opts":{"A":"Puede realizarse sin soporte legal.","B":"Elimina la planeación presupuestal.","C":"Permite ajustes conforme a procedimientos legales.","D":"Sustituye la aprobación presupuestal."},"ans":"C","just":"Las modificaciones deben cumplir requisitos legales."},{"id":178,"comp":"Competencias Funcionales Específicas","tema":"Presupuesto público","txt":"El principio de equilibrio presupuestal busca que los gastos autorizados no superen los ingresos previstos, contribuyendo a la estabilidad financiera del Estado.","opts":{"A":"Autoriza déficit ilimitado.","B":"Sustituye la sostenibilidad fiscal.","C":"Busca equilibrio entre ingresos y gastos.","D":"Elimina la inversión pública."},"ans":"C","just":"El equilibrio presupuestal protege la sostenibilidad financiera."},{"id":179,"comp":"Competencias Funcionales Específicas","tema":"Presupuesto público","txt":"La gestión financiera pública integra presupuesto, contabilidad y tesorería, garantizando una administración armónica y eficiente de los recursos públicos, aspecto clave para el control fiscal.","opts":{"A":"Funciona de manera independiente.","B":"Excluye la contabilidad pública.","C":"Integra presupuesto, contabilidad y tesorería.","D":"Sustituye el control interno."},"ans":"C","just":"La gestión financiera es integral e interdependiente."},{"id":180,"comp":"Competencias Funcionales Específicas","tema":"Presupuesto público","txt":"El conocimiento de las normas presupuestales permite al servidor de la CGR identificar irregularidades en la ejecución del gasto, prevenir el detrimento patrimonial y fortalecer el control fiscal.","opts":{"A":"No incide en el control fiscal.","B":"Es exclusivo del área financiera.","C":"Fortalece la vigilancia del gasto público.","D":"Sustituye la auditoría fiscal."},"ans":"C","just":"El control presupuestal es eje del control fiscal."},{"id":181,"comp":"Competencias Funcionales Específicas","tema":"Gestión documental","txt":"La gestión documental es el conjunto de actividades administrativas y técnicas orientadas a la planificación, producción, organización, trámite, conservación y disposición final de los documentos. En la CGR, es fundamental para garantizar la trazabilidad, transparencia y soporte probatorio del control fiscal.","opts":{"A":"Se limita al archivo histórico.","B":"Aplica solo a documentos físicos.","C":"Garantiza organización, trazabilidad y soporte probatorio.","D":"Sustituye el control fiscal."},"ans":"C","just":"La gestión documental soporta el control fiscal."},{"id":182,"comp":"Competencias Funcionales Específicas","tema":"Gestión documental","txt":"El ciclo vital del documento comprende las etapas por las que atraviesa un documento desde su producción hasta su disposición final, permitiendo una administración eficiente y conforme a la normativa archivística.","opts":{"A":"Comprende solo el archivo definitivo.","B":"Aplica únicamente a documentos electrónicos.","C":"Incluye producción, trámite, conservación y disposición final.","D":"Sustituye las TRD."},"ans":"C","just":"El ciclo vital orienta la gestión documental."},{"id":183,"comp":"Competencias Funcionales Específicas","tema":"Gestión documental","txt":"Las Tablas de Retención Documental (TRD) son instrumentos archivísticos que establecen los tiempos de conservación de los documentos y su disposición final, siendo obligatorias para las entidades públicas.","opts":{"A":"Son de aplicación opcional.","B":"Sustituyen el PINAR.","C":"Definen tiempos de conservación y disposición final.","D":"Aplica solo a archivos históricos."},"ans":"C","just":"Las TRD son obligatorias en entidades públicas."},{"id":184,"comp":"Competencias Funcionales Específicas","tema":"Gestión documental","txt":"El Programa de Gestión Documental (PGD) integra las políticas, procesos y procedimientos archivísticos de una entidad, garantizando una gestión documental coherente y alineada con la función misional.","opts":{"A":"Es un documento informativo sin aplicación.","B":"Reemplaza los instrumentos archivísticos.","C":"Articula políticas y procesos documentales.","D":"Aplica solo a archivos electrónicos."},"ans":"C","just":"El PGD orienta la gestión documental institucional."},{"id":185,"comp":"Competencias Funcionales Específicas","tema":"Gestión documental","txt":"La correcta organización de los archivos facilita el acceso oportuno a la información, fortalece la transparencia y respalda las auditorías y actuaciones de control fiscal de la CGR.","opts":{"A":"Dificulta el acceso a la información.","B":"Es irrelevante para el control fiscal.","C":"Facilita acceso, transparencia y auditoría.","D":"Sustituye la gestión administrativa."},"ans":"C","just":"La organización archivística fortalece la transparencia."},{"id":186,"comp":"Competencias Funcionales Específicas","tema":"Gestión documental","txt":"La gestión de documentos electrónicos exige garantizar autenticidad, integridad, fiabilidad y disponibilidad de la información, conforme a estándares técnicos y normativos vigentes.","opts":{"A":"Elimina la necesidad de control interno.","B":"Aplica solo a archivos físicos.","C":"Garantiza autenticidad e integridad documental.","D":"Sustituye la seguridad de la información."},"ans":"C","just":"La gestión electrónica protege la información institucional."},{"id":187,"comp":"Competencias Funcionales Específicas","tema":"Gestión documental","txt":"El acceso a los documentos públicos es un derecho ciudadano, salvo las reservas legales. La adecuada gestión documental garantiza el ejercicio de este derecho y la rendición de cuentas.","opts":{"A":"Restringe el derecho de acceso.","B":"Aplica solo a documentos históricos.","C":"Garantiza acceso y rendición de cuentas.","D":"Elimina la protección de datos."},"ans":"C","just":"La gestión documental respalda el acceso a la información."},{"id":188,"comp":"Competencias Funcionales Específicas","tema":"Gestión documental","txt":"La disposición final de documentos debe realizarse conforme a las TRD y procedimientos aprobados, evitando eliminación indebida de información pública relevante.","opts":{"A":"Permite eliminación discrecional.","B":"Aplica solo a documentos sin valor.","C":"Debe realizarse conforme a TRD y procedimientos.","D":"Sustituye la valoración documental."},"ans":"C","just":"La disposición final protege la memoria institucional."},{"id":189,"comp":"Competencias Funcionales Específicas","tema":"Gestión documental","txt":"La auditoría a la gestión documental permite verificar el cumplimiento normativo y detectar riesgos asociados a la pérdida, alteración o uso indebido de documentos públicos.","opts":{"A":"Carece de impacto institucional.","B":"Sustituye la auditoría financiera.","C":"Permite identificar riesgos documentales.","D":"Aplica solo a archivos centrales."},"ans":"C","just":"La auditoría documental previene riesgos institucionales."},{"id":190,"comp":"Competencias Funcionales Específicas","tema":"Gestión documental","txt":"El dominio de la gestión documental por parte del Profesional Universitario de la CGR fortalece la eficiencia administrativa, la legalidad de las actuaciones y la efectividad del control fiscal.","opts":{"A":"No incide en el control fiscal.","B":"Es secundaria frente a otras funciones.","C":"Fortalece eficiencia, legalidad y control fiscal.","D":"Sustituye el control interno."},"ans":"C","just":"La gestión documental es pilar del control fiscal."},{"id":191,"comp":"Competencias Funcionales Específicas","tema":"Normativa archivística","txt":"La normativa archivística en Colombia regula la organización, conservación y acceso a los documentos públicos, garantizando la memoria institucional y el derecho ciudadano a la información. Para la CGR, su cumplimiento es esencial para respaldar el control fiscal.","opts":{"A":"Aplica solo a archivos históricos.","B":"Es de aplicación voluntaria.","C":"Regula la gestión y conservación de documentos públicos.","D":"Sustituye la gestión administrativa."},"ans":"C","just":"La normativa archivística es de obligatorio cumplimiento."},{"id":192,"comp":"Competencias Funcionales Específicas","tema":"Normativa archivística","txt":"La Ley General de Archivos (Ley 594 de 2000) establece los principios y reglas básicas para la función archivística del Estado, siendo de obligatorio cumplimiento para todas las entidades públicas.","opts":{"A":"Aplica solo a entidades territoriales.","B":"Sustituye la Ley de Transparencia.","C":"Regula la función archivística del Estado.","D":"Es opcional para las entidades públicas."},"ans":"C","just":"La Ley 594 de 2000 rige la gestión archivística pública."},{"id":193,"comp":"Competencias Funcionales Específicas","tema":"Normativa archivística","txt":"El Archivo General de la Nación es la entidad rectora del Sistema Nacional de Archivos y tiene la función de fijar políticas y normas técnicas archivísticas en Colombia.","opts":{"A":"Depende de la CGR.","B":"Sustituye a los archivos institucionales.","C":"Es la entidad rectora de la función archivística.","D":"Aplica solo al archivo histórico nacional."},"ans":"C","just":"El AGN dirige la política archivística nacional."},{"id":194,"comp":"Competencias Funcionales Específicas","tema":"Normativa archivística","txt":"Los principios archivísticos, como procedencia y orden original, garantizan la integridad y autenticidad de los documentos, permitiendo su adecuado uso y valoración como prueba.","opts":{"A":"Son criterios opcionales.","B":"Aplican solo a documentos electrónicos.","C":"Garantizan autenticidad e integridad documental.","D":"Sustituyen las TRD."},"ans":"C","just":"Los principios archivísticos son fundamentales."},{"id":195,"comp":"Competencias Funcionales Específicas","tema":"Normativa archivística","txt":"La valoración documental permite determinar el valor administrativo, legal, fiscal e histórico de los documentos, definiendo su tiempo de conservación y disposición final.","opts":{"A":"Aplica solo a documentos históricos.","B":"Elimina la necesidad de TRD.","C":"Permite definir conservación y disposición final.","D":"Sustituye la organización documental."},"ans":"C","just":"La valoración documental orienta la disposición final."},{"id":196,"comp":"Competencias Funcionales Específicas","tema":"Normativa archivística","txt":"El Sistema Integrado de Conservación (SIC) establece medidas para preservar los documentos a largo plazo, evitando su deterioro y pérdida de información relevante para la gestión pública.","opts":{"A":"Aplica solo a archivos históricos.","B":"Sustituye la gestión documental.","C":"Garantiza la conservación documental.","D":"Elimina la necesidad de archivos."},"ans":"C","just":"El SIC protege la memoria institucional."},{"id":197,"comp":"Competencias Funcionales Específicas","tema":"Normativa archivística","txt":"La eliminación documental solo puede realizarse conforme a las TRD y con la aprobación correspondiente, evitando la destrucción indebida de documentos públicos.","opts":{"A":"Puede hacerse libremente.","B":"Aplica solo a documentos digitales.","C":"Debe ajustarse a TRD y procedimientos.","D":"Sustituye la valoración documental."},"ans":"C","just":"La eliminación indebida genera responsabilidad."},{"id":198,"comp":"Competencias Funcionales Específicas","tema":"Normativa archivística","txt":"La gestión de archivos en entidades públicas es responsabilidad de todos los servidores públicos y no exclusivamente del área archivística, garantizando una adecuada producción y conservación documental.","opts":{"A":"Es exclusiva del archivista.","B":"Aplica solo a directivos.","C":"Es responsabilidad de todos los servidores.","D":"Sustituye el control interno."},"ans":"C","just":"La función archivística es institucional."},{"id":199,"comp":"Competencias Funcionales Específicas","tema":"Normativa archivística","txt":"El incumplimiento de la normativa archivística puede generar responsabilidades disciplinarias, fiscales y penales, afectando la integridad y memoria institucional del Estado.","opts":{"A":"No genera consecuencias jurídicas.","B":"Aplica solo a entidades privadas.","C":"Puede generar múltiples responsabilidades.","D":"Sustituye el control fiscal."},"ans":"C","just":"La gestión archivística tiene consecuencias jurídicas."},{"id":200,"comp":"Competencias Funcionales Específicas","tema":"Normativa archivística","txt":"El conocimiento de la normativa archivística permite al Profesional Universitario de la CGR verificar el cumplimiento legal, proteger la información pública y fortalecer el control fiscal documental.","opts":{"A":"No se relaciona con el control fiscal.","B":"Es irrelevante para la CGR.","C":"Fortalece el control fiscal documental.","D":"Sustituye la gestión administrativa."},"ans":"C","just":"La normativa archivística respalda el control fiscal."},{"id":201,"comp":"Competencias Funcionales Específicas","tema":"Administración del personal","txt":"La administración del personal en el sector público comprende los procesos orientados a la gestión integral del talento humano, garantizando el ingreso, permanencia y retiro de los servidores conforme a los principios de mérito, legalidad y transparencia. Para la CGR, su correcta aplicación fortalece la función pública.","opts":{"A":"Aplica solo al sector privado.","B":"Es una función discrecional sin normas.","C":"Garantiza gestión del talento humano con base en mérito y legalidad.","D":"Sustituye la carrera administrativa."},"ans":"C","just":"La administración del personal se rige por principios constitucionales."},{"id":202,"comp":"Competencias Funcionales Específicas","tema":"Administración del personal","txt":"La carrera administrativa es un sistema técnico de administración del personal que busca garantizar la estabilidad laboral, la profesionalización del servicio público y la igualdad de oportunidades mediante concursos de mérito.","opts":{"A":"Permite ingreso discrecional.","B":"Aplica solo a cargos provisionales.","C":"Garantiza ingreso y permanencia por mérito.","D":"Sustituye el régimen disciplinario."},"ans":"C","just":"La carrera administrativa protege la profesionalización del servicio."},{"id":203,"comp":"Competencias Funcionales Específicas","tema":"Administración del personal","txt":"El concurso de méritos es el mecanismo constitucional para el ingreso y ascenso en los empleos de carrera administrativa, asegurando transparencia, igualdad y selección objetiva.","opts":{"A":"Es opcional para entidades públicas.","B":"Aplica solo a cargos directivos.","C":"Garantiza selección objetiva y transparencia.","D":"Sustituye la evaluación del desempeño."},"ans":"C","just":"El concurso materializa el principio de mérito."},{"id":204,"comp":"Competencias Funcionales Específicas","tema":"Administración del personal","txt":"La evaluación del desempeño laboral es una herramienta de gestión que permite medir el cumplimiento de funciones y metas por parte de los servidores públicos, incidiendo en la permanencia y desarrollo en la carrera administrativa.","opts":{"A":"Es un trámite sin efectos.","B":"Aplica solo a servidores provisionales.","C":"Evalúa cumplimiento de funciones y metas.","D":"Sustituye el régimen disciplinario."},"ans":"C","just":"La evaluación del desempeño mejora la gestión pública."},{"id":205,"comp":"Competencias Funcionales Específicas","tema":"Administración del personal","txt":"Los derechos y deberes de los servidores públicos buscan equilibrar el ejercicio de la función pública con la responsabilidad frente al interés general, siendo base de la ética y el buen desempeño laboral.","opts":{"A":"Otorgan privilegios ilimitados.","B":"Son irrelevantes para la gestión pública.","C":"Garantizan equilibrio entre responsabilidad y función pública.","D":"Sustituyen el régimen disciplinario."},"ans":"C","just":"Los derechos y deberes orientan la conducta del servidor."},{"id":206,"comp":"Competencias Funcionales Específicas","tema":"Administración del personal","txt":"La capacitación y el bienestar laboral contribuyen al desarrollo de competencias, motivación y desempeño de los servidores públicos, impactando positivamente la calidad del servicio al ciudadano.","opts":{"A":"Son opcionales para la entidad.","B":"No inciden en la gestión pública.","C":"Fortalecen competencias y calidad del servicio.","D":"Sustituyen la evaluación del desempeño."},"ans":"C","just":"El talento humano es eje de la gestión pública."},{"id":207,"comp":"Competencias Funcionales Específicas","tema":"Administración del personal","txt":"La estabilidad laboral reforzada protege a determinados servidores públicos frente a despidos arbitrarios, garantizando derechos fundamentales y el debido proceso.","opts":{"A":"Autoriza estabilidad absoluta.","B":"Aplica solo al sector privado.","C":"Protege derechos fundamentales de servidores.","D":"Sustituye el concurso de méritos."},"ans":"C","just":"La estabilidad reforzada tiene fundamento constitucional."},{"id":208,"comp":"Competencias Funcionales Específicas","tema":"Administración del personal","txt":"El retiro del servicio en la carrera administrativa debe realizarse conforme a causales legales y con observancia del debido proceso, evitando arbitrariedades administrativas.","opts":{"A":"Puede hacerse sin motivación.","B":"Aplica solo a contratos temporales.","C":"Debe sujetarse a causales legales y debido proceso.","D":"Elimina la estabilidad laboral."},"ans":"C","just":"El retiro debe respetar garantías legales."},{"id":209,"comp":"Competencias Funcionales Específicas","tema":"Administración del personal","txt":"El régimen de inhabilidades e incompatibilidades busca prevenir conflictos de interés y garantizar la moralidad administrativa en el ejercicio de la función pública.","opts":{"A":"Es exclusivo del sector privado.","B":"Aplica solo a altos directivos.","C":"Previene conflictos de interés en la función pública.","D":"Sustituye el régimen disciplinario."},"ans":"C","just":"Las inhabilidades protegen la moralidad administrativa."},{"id":210,"comp":"Competencias Funcionales Específicas","tema":"Administración del personal","txt":"El conocimiento del régimen de administración del personal por parte del Profesional Universitario de la CGR permite verificar el cumplimiento normativo, fortalecer la gestión del talento humano y contribuir a la integridad institucional.","opts":{"A":"No tiene relación con el control fiscal.","B":"Es irrelevante para la CGR.","C":"Fortalece la legalidad y gestión del talento humano.","D":"Sustituye la auditoría administrativa."},"ans":"C","just":"La adecuada gestión del personal fortalece la institucionalidad."},{"id":211,"comp":"Competencias Funcionales Específicas","tema":"Gestión del conocimiento e innovación","txt":"La gestión del conocimiento en las entidades públicas comprende los procesos orientados a identificar, documentar, compartir y aprovechar el conocimiento institucional para mejorar la toma de decisiones y la prestación del servicio. En la CGR, este enfoque fortalece el control fiscal y la continuidad institucional.","opts":{"A":"Es exclusiva del sector privado.","B":"Sustituye la gestión documental.","C":"Permite aprovechar el conocimiento institucional para mejorar la gestión.","D":"Carece de impacto en el control fiscal."},"ans":"C","just":"La gestión del conocimiento fortalece la capacidad institucional."},{"id":212,"comp":"Competencias Funcionales Específicas","tema":"Gestión del conocimiento e innovación","txt":"La sistematización de experiencias permite capturar aprendizajes derivados de procesos, proyectos y auditorías, evitando la pérdida de conocimiento crítico y promoviendo la mejora continua en la gestión pública.","opts":{"A":"Limita la creatividad institucional.","B":"Aplica solo a proyectos tecnológicos.","C":"Permite capturar aprendizajes y fortalecer la mejora continua.","D":"Sustituye la evaluación de resultados."},"ans":"C","just":"La sistematización evita la pérdida de conocimiento."},{"id":213,"comp":"Competencias Funcionales Específicas","tema":"Gestión del conocimiento e innovación","txt":"La innovación pública busca generar soluciones nuevas o mejoradas para atender problemas públicos, optimizar procesos y crear valor público, siendo un elemento relevante para modernizar la gestión institucional.","opts":{"A":"Se limita a cambios tecnológicos.","B":"Carece de respaldo normativo.","C":"Genera soluciones que mejoran procesos y crean valor público.","D":"Sustituye la planeación institucional."},"ans":"C","just":"La innovación contribuye a la modernización del Estado."},{"id":214,"comp":"Competencias Funcionales Específicas","tema":"Gestión del conocimiento e innovación","txt":"La transferencia de conocimiento entre servidores públicos facilita la continuidad de los procesos, la estandarización de buenas prácticas y la reducción de riesgos institucionales asociados a la rotación de personal.","opts":{"A":"Genera dependencia individual.","B":"Aplica solo a procesos informales.","C":"Facilita continuidad y estandarización de buenas prácticas.","D":"Sustituye la capacitación formal."},"ans":"C","just":"La transferencia de conocimiento reduce riesgos institucionales."},{"id":215,"comp":"Competencias Funcionales Específicas","tema":"Gestión del conocimiento e innovación","txt":"Las comunidades de práctica permiten a los servidores compartir experiencias, resolver problemas comunes y construir conocimiento colectivo, fortaleciendo la colaboración y el aprendizaje organizacional.","opts":{"A":"Sustituyen los manuales de procesos.","B":"Limita el trabajo colaborativo.","C":"Fomentan intercambio de conocimiento y aprendizaje colectivo.","D":"Aplica solo al sector privado."},"ans":"C","just":"Las comunidades de práctica fortalecen el aprendizaje institucional."},{"id":216,"comp":"Competencias Funcionales Específicas","tema":"Gestión del conocimiento e innovación","txt":"La gestión del conocimiento está alineada con el MIPG y contribuye al cumplimiento de los objetivos estratégicos, el mejoramiento continuo y la eficiencia institucional.","opts":{"A":"Opera de manera independiente del MIPG.","B":"Sustituye la planeación estratégica.","C":"Aporta al logro de objetivos y mejora continua.","D":"Carece de relevancia institucional."},"ans":"C","just":"La gestión del conocimiento es eje del MIPG."},{"id":217,"comp":"Competencias Funcionales Específicas","tema":"Gestión del conocimiento e innovación","txt":"El uso de herramientas tecnológicas para la gestión del conocimiento facilita el almacenamiento, búsqueda y difusión de información institucional, apoyando procesos misionales y administrativos.","opts":{"A":"Genera sobrecarga administrativa.","B":"Aplica solo a archivos históricos.","C":"Facilita almacenamiento y difusión del conocimiento.","D":"Sustituye el control documental."},"ans":"C","just":"La tecnología apoya la gestión del conocimiento."},{"id":218,"comp":"Competencias Funcionales Específicas","tema":"Gestión del conocimiento e innovación","txt":"La cultura organizacional orientada al aprendizaje promueve la curiosidad, la mejora continua y la adopción de buenas prácticas, fortaleciendo la capacidad institucional de adaptación al cambio.","opts":{"A":"Genera resistencia al cambio.","B":"Limita la innovación.","C":"Fomenta aprendizaje y adaptación institucional.","D":"Sustituye el control interno."},"ans":"C","just":"El aprendizaje organizacional fortalece la institucionalidad."},{"id":219,"comp":"Competencias Funcionales Específicas","tema":"Gestión del conocimiento e innovación","txt":"La protección del conocimiento institucional implica definir medidas para evitar su pérdida, uso indebido o divulgación no autorizada, garantizando la seguridad de la información estratégica.","opts":{"A":"Elimina el acceso a la información pública.","B":"Aplica solo a información confidencial privada.","C":"Protege información estratégica y conocimiento institucional.","D":"Sustituye la transparencia."},"ans":"C","just":"La protección del conocimiento es parte de la seguridad institucional."},{"id":220,"comp":"Competencias Funcionales Específicas","tema":"Gestión del conocimiento e innovación","txt":"El fortalecimiento de la gestión del conocimiento e innovación por parte de la CGR contribuye a mejorar el control fiscal, la eficiencia institucional y la generación de valor público en el Estado Social de Derecho.","opts":{"A":"No tiene impacto en el control fiscal.","B":"Es irrelevante para la CGR.","C":"Fortalece control fiscal y eficiencia institucional.","D":"Sustituye la formación profesional."},"ans":"C","just":"El conocimiento es activo estratégico del Estado."},{"id":221,"comp":"Competencias Funcionales Específicas","tema":"Derecho laboral","txt":"El Derecho Laboral regula las relaciones entre empleadores y trabajadores, protegiendo derechos mínimos y garantizando condiciones dignas. En el sector público, su conocimiento permite a la CGR verificar el cumplimiento de normas laborales en la gestión del talento humano estatal.","opts":{"A":"Regula solo relaciones privadas.","B":"Sustituye el régimen administrativo.","C":"Regula derechos y deberes en la relación laboral.","D":"Aplica solo al sector sindical."},"ans":"C","just":"El Derecho Laboral protege relaciones de trabajo."},{"id":222,"comp":"Competencias Funcionales Específicas","tema":"Derecho laboral","txt":"El contrato de trabajo se configura cuando concurren prestación personal del servicio, subordinación y remuneración. La identificación de estos elementos permite determinar la existencia de una relación laboral aun sin contrato escrito.","opts":{"A":"Exige contrato escrito formal.","B":"Depende solo del pago salarial.","C":"Se configura por servicio personal, subordinación y remuneración.","D":"Aplica solo al sector privado."},"ans":"C","just":"Los elementos esenciales determinan la relación laboral."},{"id":223,"comp":"Competencias Funcionales Específicas","tema":"Derecho laboral","txt":"El principio de primacía de la realidad establece que, en caso de discrepancia entre lo que ocurre en la práctica y lo que figura en documentos, prevalece la situación real, protegiendo los derechos del trabajador.","opts":{"A":"Aplica solo a contratos escritos.","B":"Sustituye la autonomía de la voluntad.","C":"Da prevalencia a los hechos reales sobre las formas.","D":"Elimina la subordinación."},"ans":"C","just":"La realidad prevalece sobre las formalidades."},{"id":224,"comp":"Competencias Funcionales Específicas","tema":"Derecho laboral","txt":"La estabilidad laboral protege al trabajador frente a despidos injustificados y tiene especial relevancia en ciertos grupos con protección reforzada, garantizando derechos fundamentales y el debido proceso.","opts":{"A":"Garantiza estabilidad absoluta.","B":"Aplica solo al sector privado.","C":"Protege frente a despidos injustificados.","D":"Sustituye la carrera administrativa."},"ans":"C","just":"La estabilidad laboral tiene fundamento constitucional."},{"id":225,"comp":"Competencias Funcionales Específicas","tema":"Derecho laboral","txt":"La jornada laboral y el descanso obligatorio son derechos mínimos del trabajador que buscan proteger su salud y dignidad, y su observancia es exigible también en el sector público.","opts":{"A":"Son opcionales para el empleador.","B":"Aplican solo a trabajadores particulares.","C":"Protegen la salud y dignidad del trabajador.","D":"Sustituyen la remuneración."},"ans":"C","just":"La jornada y el descanso son derechos laborales."},{"id":226,"comp":"Competencias Funcionales Específicas","tema":"Derecho laboral","txt":"La seguridad social es un derecho irrenunciable que comprende salud, pensiones y riesgos laborales, y su garantía es obligación del empleador público y privado.","opts":{"A":"Aplica solo a trabajadores oficiales.","B":"Es renunciable por acuerdo.","C":"Comprende salud, pensiones y riesgos laborales.","D":"Sustituye el salario."},"ans":"C","just":"La seguridad social es derecho fundamental."},{"id":227,"comp":"Competencias Funcionales Específicas","tema":"Derecho laboral","txt":"El fuero sindical otorga protección especial a los directivos sindicales frente al despido, con el fin de garantizar la libertad sindical y la negociación colectiva.","opts":{"A":"Es un privilegio sin límites.","B":"Aplica a todos los trabajadores.","C":"Protege la libertad sindical.","D":"Sustituye el contrato laboral."},"ans":"C","just":"El fuero sindical garantiza derechos colectivos."},{"id":228,"comp":"Competencias Funcionales Específicas","tema":"Derecho laboral","txt":"Las sanciones disciplinarias en el marco laboral deben respetar el debido proceso y la proporcionalidad, evitando abusos del poder disciplinario del empleador.","opts":{"A":"Pueden imponerse sin procedimiento.","B":"Eliminan derechos laborales.","C":"Deben respetar debido proceso y proporcionalidad.","D":"Sustituyen la responsabilidad disciplinaria."},"ans":"C","just":"El debido proceso rige las sanciones laborales."},{"id":229,"comp":"Competencias Funcionales Específicas","tema":"Derecho laboral","txt":"Los conflictos laborales pueden resolverse mediante mecanismos como la conciliación, promoviendo soluciones pacíficas y evitando litigios prolongados.","opts":{"A":"Eliminan la vía judicial.","B":"Aplican solo a conflictos colectivos.","C":"Facilitan soluciones pacíficas a conflictos laborales.","D":"Sustituyen la negociación colectiva."},"ans":"C","just":"La conciliación promueve solución pacífica de conflictos."},{"id":230,"comp":"Competencias Funcionales Específicas","tema":"Derecho laboral","txt":"El conocimiento del Derecho Laboral permite al Profesional Universitario de la CGR identificar riesgos legales en la gestión del talento humano, prevenir litigios y contribuir a la legalidad administrativa.","opts":{"A":"No guarda relación con el control fiscal.","B":"Es irrelevante para la CGR.","C":"Fortalece la legalidad y previene riesgos laborales.","D":"Sustituye la auditoría administrativa."},"ans":"C","just":"El Derecho Laboral apoya la gestión pública legal."},{"id":231,"comp":"Competencias Funcionales Específicas","tema":"Indicadores de gestión","txt":"Los indicadores de gestión son herramientas que permiten medir el desempeño institucional en términos de eficiencia, eficacia y efectividad. En la CGR, su análisis facilita la evaluación de resultados y el control fiscal orientado al valor público.","opts":{"A":"Son datos descriptivos sin análisis.","B":"Sustituyen la auditoría fiscal.","C":"Permiten medir desempeño y resultados institucionales.","D":"Carecen de utilidad práctica."},"ans":"C","just":"Los indicadores permiten evaluar la gestión pública."},{"id":232,"comp":"Competencias Funcionales Específicas","tema":"Indicadores de gestión","txt":"Los indicadores de eficiencia miden la relación entre recursos utilizados y productos generados, permitiendo analizar el uso racional de los recursos públicos.","opts":{"A":"Miden solo impacto social.","B":"Evalúan únicamente calidad.","C":"Analizan relación entre insumos y productos.","D":"Sustituyen la planeación."},"ans":"C","just":"La eficiencia evalúa el uso de recursos."},{"id":233,"comp":"Competencias Funcionales Específicas","tema":"Indicadores de gestión","txt":"Los indicadores de eficacia permiten medir el grado de cumplimiento de los objetivos y metas institucionales previstos, independientemente de los recursos utilizados.","opts":{"A":"Miden gastos ejecutados.","B":"Analizan resultados financieros.","C":"Miden cumplimiento de objetivos y metas.","D":"Sustituyen el control presupuestal."},"ans":"C","just":"La eficacia mide logro de metas."},{"id":234,"comp":"Competencias Funcionales Específicas","tema":"Indicadores de gestión","txt":"Los indicadores de efectividad evalúan el impacto real de las acciones institucionales en la solución de problemas públicos, siendo esenciales para el enfoque de gestión por resultados.","opts":{"A":"Sustituyen los indicadores financieros.","B":"Miden solo ejecución presupuestal.","C":"Evalúan impacto y resultados reales.","D":"Carecen de relevancia fiscal."},"ans":"C","just":"La efectividad mide impacto de la intervención pública."},{"id":235,"comp":"Competencias Funcionales Específicas","tema":"Indicadores de gestión","txt":"Un sistema de indicadores adecuado debe ser coherente con los objetivos estratégicos, medible, verificable y relevante para la toma de decisiones y el control institucional.","opts":{"A":"Puede definirse sin objetivos claros.","B":"No requiere información confiable.","C":"Debe ser coherente, medible y verificable.","D":"Sustituye la planeación estratégica."},"ans":"C","just":"Los indicadores deben ser técnicamente válidos."},{"id":236,"comp":"Competencias Funcionales Específicas","tema":"Indicadores de gestión","txt":"El seguimiento a los indicadores de gestión permite identificar desviaciones, adoptar acciones correctivas y mejorar el desempeño institucional, fortaleciendo la gestión pública.","opts":{"A":"Aplica solo al cierre de la vigencia.","B":"Limita la capacidad de gestión.","C":"Permite adoptar correctivos oportunos.","D":"Sustituye el control fiscal."},"ans":"C","just":"El seguimiento mejora la gestión institucional."},{"id":237,"comp":"Competencias Funcionales Específicas","tema":"Indicadores de gestión","txt":"La alineación de los indicadores con el MIPG y el Plan de Desarrollo permite evaluar coherencia entre planeación, ejecución y resultados, siendo insumo para el control fiscal.","opts":{"A":"Elimina la planeación institucional.","B":"Sustituye el presupuesto.","C":"Permite evaluar coherencia planificación-resultados.","D":"Carece de impacto institucional."},"ans":"C","just":"La alineación fortalece la gestión por resultados."},{"id":238,"comp":"Competencias Funcionales Específicas","tema":"Indicadores de gestión","txt":"La calidad de la información es un factor crítico para la validez de los indicadores de gestión, pues información incompleta o inexacta afecta la confiabilidad del análisis institucional.","opts":{"A":"No incide en el análisis.","B":"Es irrelevante para la gestión.","C":"Garantiza confiabilidad de los indicadores.","D":"Sustituye la auditoría."},"ans":"C","just":"La información confiable es base del indicador."},{"id":239,"comp":"Competencias Funcionales Específicas","tema":"Indicadores de gestión","txt":"La socialización de resultados de los indicadores promueve la transparencia, la rendición de cuentas y la toma de decisiones informada en la administración pública.","opts":{"A":"Genera riesgos institucionales.","B":"Dificulta la transparencia.","C":"Fortalece rendición de cuentas y decisiones.","D":"Sustituye control ciudadano."},"ans":"C","just":"La divulgación fortalece la transparencia."},{"id":240,"comp":"Competencias Funcionales Específicas","tema":"Indicadores de gestión","txt":"El dominio de los indicadores de gestión por parte del Profesional Universitario de la CGR permite evaluar desempeño, identificar riesgos y contribuir a un control fiscal orientado a resultados y valor público.","opts":{"A":"No tiene relación con control fiscal.","B":"Es irrelevante para la CGR.","C":"Fortalece el control fiscal basado en resultados.","D":"Sustituye la auditoría financiera."},"ans":"C","just":"Los indicadores son herramientas del control fiscal moderno."},{"id":241,"comp":"Competencias Funcionales Específicas","tema":"Proyectos de infraestructura","txt":"Los proyectos de infraestructura pública comprenden obras y activos destinados a garantizar servicios esenciales como transporte, saneamiento o equipamientos públicos. Para la CGR, su análisis es clave para verificar la adecuada planeación, ejecución y protección de los recursos públicos invertidos.","opts":{"A":"Se limitan a obras privadas.","B":"Carecen de impacto fiscal.","C":"Involucran inversión pública y requieren control integral.","D":"Sustituyen la planeación territorial."},"ans":"C","just":"La infraestructura pública compromete recursos estatales."},{"id":242,"comp":"Competencias Funcionales Específicas","tema":"Proyectos de infraestructura","txt":"La etapa de planeación en proyectos de infraestructura incluye estudios y diseños previos, análisis de riesgos y estimación de costos, elementos esenciales para evitar sobrecostos y retrasos durante la ejecución.","opts":{"A":"Inicia con la construcción.","B":"Es irrelevante para el control fiscal.","C":"Permite prevenir riesgos y sobrecostos.","D":"Sustituye la supervisión."},"ans":"C","just":"La planeación reduce riesgos fiscales y técnicos."},{"id":243,"comp":"Competencias Funcionales Específicas","tema":"Proyectos de infraestructura","txt":"Los estudios y diseños técnicos definen especificaciones de la obra y orientan la correcta ejecución del proyecto, siendo un referente obligatorio para la supervisión e interventoría.","opts":{"A":"Son documentos indicativos.","B":"Aplican solo a proyectos privados.","C":"Orientan la correcta ejecución de la obra.","D":"Sustituyen el contrato de obra."},"ans":"C","just":"Los estudios y diseños son soporte técnico del proyecto."},{"id":244,"comp":"Competencias Funcionales Específicas","tema":"Proyectos de infraestructura","txt":"La supervisión y la interventoría en proyectos de infraestructura buscan verificar la correcta ejecución técnica, financiera y administrativa de la obra conforme al contrato y la normativa vigente.","opts":{"A":"Sustituyen el control fiscal.","B":"Eliminan la responsabilidad del contratista.","C":"Verifican cumplimiento técnico, financiero y contractual.","D":"Aplica solo en obra privada."},"ans":"C","just":"La supervisión e interventoría previenen fallas y detrimentos."},{"id":245,"comp":"Competencias Funcionales Específicas","tema":"Proyectos de infraestructura","txt":"Los riesgos en proyectos de infraestructura pueden ser técnicos, financieros, ambientales y sociales. Su identificación y gestión oportuna permite mitigar impactos negativos y proteger la inversión pública.","opts":{"A":"Son inevitables y no gestionables.","B":"Aplican solo al sector privado.","C":"Deben identificarse y gestionarse oportunamente.","D":"Sustituyen la planeación."},"ans":"C","just":"La gestión del riesgo protege la inversión pública."},{"id":246,"comp":"Competencias Funcionales Específicas","tema":"Proyectos de infraestructura","txt":"Las modificaciones contractuales en proyectos de infraestructura deben justificarse técnica y jurídicamente, respetando el equilibrio económico del contrato y los límites legales.","opts":{"A":"Pueden realizarse sin justificación.","B":"Eliminan la planeación inicial.","C":"Deben justificarse y respetar el marco legal.","D":"Sustituyen el contrato original."},"ans":"C","just":"Las modificaciones requieren soporte técnico y legal."},{"id":247,"comp":"Competencias Funcionales Específicas","tema":"Proyectos de infraestructura","txt":"La liquidación de los contratos de infraestructura permite verificar la ejecución final, el cumplimiento del objeto y el cierre financiero del proyecto, siendo un momento clave para el control fiscal.","opts":{"A":"Es opcional para la entidad.","B":"Aplica solo a contratos menores.","C":"Permite verificar cumplimiento y cierre contractual.","D":"Sustituye la supervisión."},"ans":"C","just":"La liquidación previene controversias y riesgos fiscales."},{"id":248,"comp":"Competencias Funcionales Específicas","tema":"Proyectos de infraestructura","txt":"La sostenibilidad de la infraestructura incluye aspectos de operación, mantenimiento y vida útil de los activos, elementos que deben considerarse desde la planeación del proyecto.","opts":{"A":"Aplica solo después de la obra.","B":"No tiene impacto fiscal.","C":"Debe considerarse desde la planeación.","D":"Sustituye la evaluación de proyectos."},"ans":"C","just":"La sostenibilidad asegura uso eficiente de recursos."},{"id":249,"comp":"Competencias Funcionales Específicas","tema":"Proyectos de infraestructura","txt":"La documentación técnica y contractual de los proyectos de infraestructura es fundamental para la trazabilidad, auditoría y control fiscal, permitiendo verificar decisiones y uso de recursos.","opts":{"A":"Es irrelevante para la CGR.","B":"Aplica solo a la etapa final.","C":"Soporta auditoría y control fiscal.","D":"Sustituye la supervisión."},"ans":"C","just":"La documentación respalda el control fiscal."},{"id":250,"comp":"Competencias Funcionales Específicas","tema":"Proyectos de infraestructura","txt":"El conocimiento en proyectos de infraestructura permite al Profesional Universitario de la CGR identificar riesgos técnicos y financieros, prevenir detrimento patrimonial y fortalecer el control fiscal de las inversiones públicas.","opts":{"A":"No guarda relación con el control fiscal.","B":"Es irrelevante para la CGR.","C":"Fortalece el control fiscal de la inversión pública.","D":"Sustituye la auditoría técnica."},"ans":"C","just":"La infraestructura es un foco crítico del control fiscal."},{"id":251,"comp":"Competencias Funcionales Específicas","tema":"Política pública y planeación estratégica","txt":"La política pública es el conjunto de decisiones, acciones y omisiones del Estado orientadas a resolver problemas públicos. Para la CGR, su análisis permite evaluar coherencia entre objetivos, ejecución de recursos y resultados, fortaleciendo el control fiscal orientado a resultados.","opts":{"A":"Se limita a declaraciones políticas.","B":"Aplica solo al nivel nacional.","C":"Orienta decisiones y acciones estatales para resolver problemas públicos.","D":"Sustituye el control fiscal."},"ans":"C","just":"La política pública guía la acción estatal."},{"id":252,"comp":"Competencias Funcionales Específicas","tema":"Política pública y planeación estratégica","txt":"La planeación estratégica define misión, visión, objetivos y metas institucionales, alineándose con planes de desarrollo y políticas públicas, permitiendo evaluar el desempeño y la gestión pública.","opts":{"A":"Es una formalidad administrativa.","B":"Sustituye el presupuesto.","C":"Permite orientar objetivos y evaluar desempeño institucional.","D":"Aplica solo al sector privado."},"ans":"C","just":"La planeación estratégica orienta la gestión pública."},{"id":253,"comp":"Competencias Funcionales Específicas","tema":"Política pública y planeación estratégica","txt":"El ciclo de la política pública comprende las etapas de formulación, implementación, seguimiento y evaluación, permitiendo un análisis integral de la intervención estatal.","opts":{"A":"Finaliza con la formulación.","B":"Aplica solo a programas sociales.","C":"Incluye formulación, implementación y evaluación.","D":"Sustituye la planeación estratégica."},"ans":"C","just":"El ciclo permite mejorar la intervención pública."},{"id":254,"comp":"Competencias Funcionales Específicas","tema":"Política pública y planeación estratégica","txt":"La articulación entre políticas públicas y presupuesto garantiza que la asignación de recursos responda a prioridades estratégicas, aspecto clave para la eficiencia y control fiscal.","opts":{"A":"El presupuesto es independiente de la política pública.","B":"Aplica solo a entidades territoriales.","C":"Asegura coherencia entre prioridades y recursos.","D":"Sustituye la planeación financiera."},"ans":"C","just":"La articulación evita ineficiencias en el gasto."},{"id":255,"comp":"Competencias Funcionales Específicas","tema":"Política pública y planeación estratégica","txt":"Los indicadores de resultado e impacto permiten evaluar los efectos reales de las políticas públicas en la población objetivo, superando el enfoque meramente procedimental.","opts":{"A":"Miden solo ejecución presupuestal.","B":"Sustituyen la evaluación institucional.","C":"Permiten evaluar efecto real de la política pública.","D":"Carecen de relevancia fiscal."},"ans":"C","just":"Los indicadores permiten evaluar impacto social."},{"id":256,"comp":"Competencias Funcionales Específicas","tema":"Política pública y planeación estratégica","txt":"La evaluación de políticas públicas proporciona evidencia para la toma de decisiones, el rediseño de intervenciones y la rendición de cuentas, fortaleciendo la gestión por resultados.","opts":{"A":"Es un trámite formal sin impacto.","B":"Sustituye la planeación.","C":"Aporta evidencia para mejorar decisiones y rendir cuentas.","D":"Aplica solo al cierre de programas."},"ans":"C","just":"La evaluación mejora la efectividad de políticas públicas."},{"id":257,"comp":"Competencias Funcionales Específicas","tema":"Política pública y planeación estratégica","txt":"La participación ciudadana en la formulación y evaluación de políticas públicas fortalece la legitimidad, transparencia y control social sobre la gestión del Estado.","opts":{"A":"Genera retrasos innecesarios.","B":"Aplica solo a consultas informales.","C":"Fortalece legitimidad y control social.","D":"Sustituye el control fiscal."},"ans":"C","just":"La participación ciudadana legitima la acción pública."},{"id":258,"comp":"Competencias Funcionales Específicas","tema":"Política pública y planeación estratégica","txt":"La coherencia entre planes institucionales, sectoriales y territoriales evita duplicidades, mejora la eficiencia del gasto y fortalece el cumplimiento de metas públicas.","opts":{"A":"No incide en la gestión pública.","B":"Aplica solo al nivel nacional.","C":"Mejora eficiencia y cumplimiento de metas.","D":"Sustituye el control presupuestal."},"ans":"C","just":"La coherencia fortalece la gestión pública."},{"id":259,"comp":"Competencias Funcionales Específicas","tema":"Política pública y planeación estratégica","txt":"La planeación basada en resultados orienta la gestión pública hacia el logro de impactos medibles, facilitando el seguimiento y la evaluación del desempeño institucional.","opts":{"A":"Se enfoca solo en insumos.","B":"Elimina la planeación tradicional.","C":"Orienta la gestión hacia resultados medibles.","D":"Carece de impacto fiscal."},"ans":"C","just":"La planeación por resultados fortalece la gestión pública."},{"id":260,"comp":"Competencias Funcionales Específicas","tema":"Política pública y planeación estratégica","txt":"El dominio en política pública y planeación estratégica permite al Profesional Universitario de la CGR evaluar la coherencia entre objetivos, recursos y resultados, fortaleciendo el control fiscal y la rendición de cuentas.","opts":{"A":"No se relaciona con el control fiscal.","B":"Es irrelevante para la CGR.","C":"Fortalece el control fiscal orientado a resultados.","D":"Sustituye la auditoría financiera."},"ans":"C","just":"La planeación estratégica es clave para el control fiscal."},{"id":261,"comp":"Competencias Institucionales","tema":"Integridad institucional","txt":"La Integridad Institucional constituye un pilar del control fiscal y de la función pública, pues orienta la conducta del servidor hacia la honestidad, la legalidad y la coherencia entre lo que se decide y lo que se ejecuta. En la CGR, este valor es esencial para la confianza ciudadana.","opts":{"A":"Se limita al cumplimiento formal de normas.","B":"Aplica solo a cargos directivos.","C":"Orienta la conducta hacia honestidad, legalidad y coherencia.","D":"Sustituye el control disciplinario."},"ans":"C","just":"La integridad guía la conducta ética institucional."},{"id":262,"comp":"Competencias Institucionales","tema":"Integridad institucional","txt":"Un servidor íntegro actúa conforme a los principios éticos incluso en situaciones de presión, conflicto de intereses o ausencia de supervisión directa, priorizando siempre el interés general.","opts":{"A":"Actúa según conveniencias personales.","B":"Solo cumple bajo supervisión.","C":"Prioriza el interés general aun bajo presión.","D":"Delegará decisiones éticas."},"ans":"C","just":"La integridad se demuestra en situaciones críticas."},{"id":263,"comp":"Competencias Institucionales","tema":"Integridad institucional","txt":"La prevención de conflictos de interés es una manifestación práctica de la integridad institucional y exige identificar, declarar y gestionar situaciones que puedan afectar la imparcialidad del servidor público.","opts":{"A":"Se maneja solo de forma disciplinaria.","B":"Aplica únicamente a contratistas.","C":"Exige identificar, declarar y gestionar conflictos.","D":"Elimina la participación del servidor."},"ans":"C","just":"Gestionar conflictos protege la imparcialidad."},{"id":264,"comp":"Competencias Institucionales","tema":"Integridad institucional","txt":"La transparencia en la actuación administrativa implica facilitar el acceso a la información pública, rendir cuentas y adoptar decisiones verificables, fortaleciendo el control social y fiscal.","opts":{"A":"Limita la autonomía institucional.","B":"Aplica solo a información financiera.","C":"Facilita el acceso y rendición de cuentas.","D":"Sustituye el control ciudadano."},"ans":"C","just":"La transparencia fortalece la confianza ciudadana."},{"id":265,"comp":"Competencias Institucionales","tema":"Integridad institucional","txt":"La denuncia responsable de irregularidades, conforme a los canales institucionales, es una conducta asociada a la integridad y contribuye a la prevención de la corrupción en la administración pública.","opts":{"A":"Genera conflictos laborales.","B":"Sustituye el control fiscal.","C":"Contribuye a prevenir corrupción.","D":"Es una obligación informal."},"ans":"C","just":"La denuncia responsable protege el interés público."},{"id":266,"comp":"Competencias Institucionales","tema":"Integridad institucional","txt":"La coherencia entre valores institucionales y acciones cotidianas del servidor público refleja un nivel avanzado de integridad y fortalece la cultura ética organizacional.","opts":{"A":"Es irrelevante para la gestión.","B":"Aplica solo en evaluaciones.","C":"Fortalece la cultura ética organizacional.","D":"Sustituye la normatividad interna."},"ans":"C","just":"La coherencia consolida la ética institucional."},{"id":267,"comp":"Competencias Institucionales","tema":"Integridad institucional","txt":"El respeto por los recursos públicos y su uso exclusivo para fines misionales es una manifestación concreta de integridad en la gestión pública.","opts":{"A":"Es responsabilidad solo del ordenador del gasto.","B":"Carece de impacto fiscal.","C":"Protege el patrimonio público.","D":"Sustituye la planeación financiera."},"ans":"C","just":"El uso correcto protege el patrimonio estatal."},{"id":268,"comp":"Competencias Institucionales","tema":"Integridad institucional","txt":"La cultura de integridad se fortalece cuando los servidores actúan como referentes éticos y promueven buenas prácticas, incluso más allá de las exigencias normativas mínimas.","opts":{"A":"Se limita a cumplir la norma.","B":"Aplica solo a directivos.","C":"Promueve buenas prácticas éticas.","D":"Elimina la responsabilidad individual."},"ans":"C","just":"El ejemplo fortalece la cultura de integridad."},{"id":269,"comp":"Competencias Institucionales","tema":"Integridad institucional","txt":"En la CGR, la integridad institucional es un factor determinante para la credibilidad del control fiscal y la legitimidad de sus actuaciones ante la sociedad.","opts":{"A":"No incide en la percepción ciudadana.","B":"Es secundaria frente a resultados.","C":"Determina la credibilidad institucional.","D":"Sustituye la transparencia."},"ans":"C","just":"La integridad legitima el control fiscal."},{"id":270,"comp":"Competencias Institucionales","tema":"Integridad institucional","txt":"El desarrollo avanzado de la integridad institucional permite al servidor de la CGR anticipar riesgos éticos, actuar preventivamente y contribuir a un control fiscal probo y confiable.","opts":{"A":"No aporta a la gestión institucional.","B":"Es irrelevante para el control fiscal.","C":"Fortalece el control fiscal probo y preventivo.","D":"Sustituye la responsabilidad fiscal."},"ans":"C","just":"La integridad avanzada previene riesgos éticos."},{"id":271,"comp":"Competencias Institucionales","tema":"Orientación al logro","txt":"La orientación al logro en el nivel avanzado implica que el servidor público establece metas retadoras, prioriza resultados medibles y actúa de manera proactiva para superar obstáculos, garantizando el cumplimiento eficaz de los objetivos institucionales de la CGR.","opts":{"A":"Se limita a cumplir instrucciones mínimas.","B":"Prioriza esfuerzo sobre resultados.","C":"Enfoca la gestión en resultados medibles y superación de obstáculos.","D":"Sustituye la planeación estratégica."},"ans":"C","just":"La orientación al logro impulsa resultados institucionales."},{"id":272,"comp":"Competencias Institucionales","tema":"Orientación al logro","txt":"Un servidor con orientación al logro evalúa permanentemente su desempeño, utiliza indicadores para medir avances y ajusta su gestión cuando identifica desviaciones frente a los objetivos planeados.","opts":{"A":"Evita la autoevaluación.","B":"Depende exclusivamente de supervisión externa.","C":"Utiliza indicadores y ajusta su gestión para cumplir metas.","D":"Sustituye el control interno."},"ans":"C","just":"El uso de indicadores mejora el desempeño."},{"id":273,"comp":"Competencias Institucionales","tema":"Orientación al logro","txt":"La gestión eficiente del tiempo y de los recursos disponibles es una conducta asociada a la orientación al logro, pues permite maximizar resultados y cumplir compromisos institucionales de manera oportuna.","opts":{"A":"Prioriza solo el esfuerzo individual.","B":"Carece de impacto institucional.","C":"Optimiza tiempo y recursos para cumplir resultados.","D":"Sustituye la planificación."},"ans":"C","just":"La eficiencia contribuye al logro de metas."},{"id":274,"comp":"Competencias Institucionales","tema":"Orientación al logro","txt":"La anticipación de riesgos y la toma de decisiones oportunas frente a posibles desviaciones son características de una orientación al logro avanzada, especialmente en contextos de presión institucional.","opts":{"A":"Actúa solo de manera reactiva.","B":"Delegará decisiones críticas.","C":"Anticipa riesgos y decide oportunamente.","D":"Evita asumir responsabilidades."},"ans":"C","just":"La anticipación mejora el cumplimiento de metas."},{"id":275,"comp":"Competencias Institucionales","tema":"Orientación al logro","txt":"La perseverancia frente a dificultades y la búsqueda de soluciones innovadoras reflejan una orientación al logro que contribuye al cumplimiento de los objetivos estratégicos de la CGR.","opts":{"A":"Acepta resultados parciales sin análisis.","B":"Evita cambios en la gestión.","C":"Busca soluciones para superar dificultades.","D":"Sustituye la planeación institucional."},"ans":"C","just":"La perseverancia favorece el logro institucional."},{"id":276,"comp":"Competencias Institucionales","tema":"Orientación al logro","txt":"La priorización de tareas estratégicas permite al servidor enfocar esfuerzos en actividades de mayor impacto institucional, optimizando la gestión y los resultados obtenidos.","opts":{"A":"Atiende solo tareas urgentes.","B":"Carece de enfoque estratégico.","C":"Prioriza actividades de mayor impacto.","D":"Sustituye la delegación."},"ans":"C","just":"Priorizar impacta positivamente los resultados."},{"id":277,"comp":"Competencias Institucionales","tema":"Orientación al logro","txt":"La orientación al logro incluye la rendición de cuentas sobre los resultados obtenidos, asumiendo responsabilidad por los compromisos adquiridos y los impactos generados.","opts":{"A":"Evita asumir responsabilidad.","B":"Aplica solo a cargos directivos.","C":"Asume responsabilidad por resultados e impactos.","D":"Sustituye la transparencia."},"ans":"C","just":"La rendición de cuentas fortalece la gestión."},{"id":278,"comp":"Competencias Institucionales","tema":"Orientación al logro","txt":"Un alto nivel de orientación al logro implica aprovechar retroalimentación y lecciones aprendidas para mejorar continuamente el desempeño y alcanzar estándares superiores de calidad institucional.","opts":{"A":"Ignora la retroalimentación.","B":"Aplica solo a evaluacion
