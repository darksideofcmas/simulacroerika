es externas.","C":"Usa retroalimentación para mejorar desempeño.","D":"Sustituye la capacitación."},"ans":"C","just":"La mejora continua impulsa mejores resultados."},{"id":279,"comp":"Competencias Institucionales","tema":"Orientación al logro","txt":"En la CGR, la orientación al logro contribuye a fortalecer el impacto del control fiscal, al garantizar que las actuaciones se traduzcan en resultados efectivos y medibles para la sociedad.","opts":{"A":"No incide en el control fiscal.","B":"Es secundaria frente a procedimientos.","C":"Fortalece el impacto del control fiscal.","D":"Sustituye la eficiencia administrativa."},"ans":"C","just":"El logro institucional genera valor público."},{"id":280,"comp":"Competencias Institucionales","tema":"Orientación al logro","txt":"El desarrollo avanzado de la orientación al logro permite al servidor de la CGR asumir retos complejos, cumplir metas exigentes y contribuir de manera decisiva al cumplimiento de los objetivos estratégicos institucionales.","opts":{"A":"Carece de relevancia institucional.","B":"Se limita al rendimiento individual.","C":"Contribuye decisivamente a objetivos estratégicos.","D":"Sustituye la planeación estratégica."},"ans":"C","just":"La orientación al logro impulsa la estrategia institucional."},{"id":281,"comp":"Competencias Institucionales","tema":"Orientación al servicio","txt":"La orientación al servicio en nivel avanzado implica comprender las necesidades de la ciudadanía y de los usuarios internos, anticiparse a ellas y actuar con oportunidad, respeto y enfoque en soluciones, garantizando respuestas claras y de calidad en el ejercicio del control fiscal.","opts":{"A":"Se limita a atender solicitudes formales.","B":"Prioriza la comodidad del servidor.","C":"Anticipa necesidades y brinda soluciones oportunas.","D":"Sustituye el cumplimiento normativo."},"ans":"C","just":"La orientación al servicio implica enfoque proactivo y resolutivo."},{"id":282,"comp":"Competencias Institucionales","tema":"Orientación al servicio","txt":"Un servidor orientado al servicio escucha activamente, interpreta adecuadamente las solicitudes y ofrece respuestas comprensibles, contribuyendo a la confianza ciudadana y a la imagen institucional de la CGR.","opts":{"A":"Responde solo con lenguaje técnico complejo.","B":"Evita interacción con el ciudadano.","C":"Escucha activamente y comunica con claridad.","D":"Limita el acceso a la información."},"ans":"C","just":"La escucha activa fortalece la atención ciudadana."},{"id":283,"comp":"Competencias Institucionales","tema":"Orientación al servicio","txt":"La adopción de mejoras continuas en la atención y en los procesos internos refleja una orientación al servicio avanzada, al buscar permanentemente elevar la calidad del servicio ofrecido.","opts":{"A":"Mantiene procesos rígidos.","B":"Evita el cambio institucional.","C":"Promueve mejoras continuas en la atención y procesos.","D":"Sustituye la planeación institucional."},"ans":"C","just":"La mejora continua eleva la calidad del servicio."},{"id":284,"comp":"Competencias Institucionales","tema":"Orientación al servicio","txt":"El trato respetuoso, imparcial y empático hacia todas las personas es una manifestación de la orientación al servicio y un requisito ético en la función pública.","opts":{"A":"Aplica solo a atención presencial.","B":"Depende del criterio personal.","C":"Garantiza trato respetuoso e imparcial.","D":"Sustituye la ética pública."},"ans":"C","just":"El respeto es eje de la función pública."},{"id":285,"comp":"Competencias Institucionales","tema":"Orientación al servicio","txt":"La gestión oportuna de PQRS refleja una orientación al servicio avanzada al permitir respuestas claras, oportunas y fundadas, fortaleciendo la transparencia y la confianza ciudadana.","opts":{"A":"Retrasa la respuesta por carga laboral.","B":"Aplica solo a PQRS sencillas.","C":"Garantiza atención oportuna y transparente.","D":"Sustituye el control fiscal."},"ans":"C","just":"La atención PQRS fortalece confianza ciudadana."},{"id":286,"comp":"Competencias Institucionales","tema":"Orientación al servicio","txt":"Un servidor con orientación al servicio coordina con otras dependencias cuando es necesario, garantizando respuestas integrales y evitando reprocesos que afecten al ciudadano.","opts":{"A":"Traslada responsabilidades sin seguimiento.","B":"Limita la actuación a su área.","C":"Coordina para brindar respuestas integrales.","D":"Sustituye la jerarquía institucional."},"ans":"C","just":"La articulación mejora la atención al ciudadano."},{"id":287,"comp":"Competencias Institucionales","tema":"Orientación al servicio","txt":"La orientación al servicio avanzado implica evaluar la satisfacción del usuario y utilizar esta información para mejorar procesos y prácticas institucionales.","opts":{"A":"Ignora la retroalimentación ciudadana.","B":"Aplica solo a evaluaciones externas.","C":"Utiliza retroalimentación para mejorar servicios.","D":"Sustituye indicadores de gestión."},"ans":"C","just":"La retroalimentación fortalece la mejora institucional."},{"id":288,"comp":"Competencias Institucionales","tema":"Orientación al servicio","txt":"En la CGR, la orientación al servicio contribuye a legitimar el control fiscal, facilitando el acceso a la información y promoviendo una relación transparente con la ciudadanía.","opts":{"A":"No incide en la percepción ciudadana.","B":"Es secundaria frente al control fiscal.","C":"Fortalece legitimidad y transparencia institucional.","D":"Sustituye la rendición de cuentas."},"ans":"C","just":"El servicio fortalece la legitimidad del control fiscal."},{"id":289,"comp":"Competencias Institucionales","tema":"Orientación al servicio","txt":"La capacidad de resolver situaciones complejas con enfoque de servicio demuestra un nivel avanzado de esta competencia, al equilibrar legalidad, oportunidad y atención al ciudadano.","opts":{"A":"Prioriza rapidez sobre legalidad.","B":"Evita asumir decisiones complejas.","C":"Equilibra legalidad y atención al ciudadano.","D":"Sustituye la función jurídica."},"ans":"C","just":"El servicio público exige equilibrio entre legalidad y atención."},{"id":290,"comp":"Competencias Institucionales","tema":"Orientación al servicio","txt":"El desarrollo avanzado de la orientación al servicio en la CGR permite responder con calidad, oportunidad y enfoque ciudadano, fortaleciendo la confianza pública y la efectividad institucional.","opts":{"A":"Carece de impacto institucional.","B":"Es irrelevante para el control fiscal.","C":"Fortalece confianza pública y efectividad institucional.","D":"Sustituye la orientación estratégica."},"ans":"C","just":"La orientación al servicio fortalece la confianza ciudadana."},{"id":291,"comp":"Competencias Institucionales","tema":"Conciencia de equipo","txt":"La conciencia de equipo en nivel avanzado implica comprender el impacto del propio trabajo en los resultados colectivos, colaborar activamente con otros y priorizar los objetivos institucionales sobre intereses individuales.","opts":{"A":"Se enfoca solo en tareas individuales.","B":"Aplica únicamente a directivos.","C":"Prioriza objetivos colectivos y colaboración.","D":"Sustituye la responsabilidad individual."},"ans":"C","just":"La conciencia de equipo fortalece resultados institucionales."},{"id":292,"comp":"Competencias Institucionales","tema":"Conciencia de equipo","txt":"Un servidor con alta conciencia de equipo comparte información relevante, apoya a sus compañeros y promueve un ambiente de confianza, mejorando la coordinación y el desempeño institucional.","opts":{"A":"Retiene información clave.","B":"Limita la cooperación interdependencias.","C":"Comparte información y promueve colaboración.","D":"Sustituye la comunicación formal."},"ans":"C","just":"Compartir información mejora el trabajo en equipo."},{"id":293,"comp":"Competencias Institucionales","tema":"Conciencia de equipo","txt":"La gestión constructiva de desacuerdos dentro del equipo permite aprovechar la diversidad de criterios, manteniendo el respeto y el enfoque en soluciones institucionales.","opts":{"A":"Evita cualquier conflicto.","B":"Genera imposiciones unilaterales.","C":"Gestiona desacuerdos de manera constructiva.","D":"Sustituye la jerarquía formal."},"ans":"C","just":"El manejo del conflicto mejora la calidad del trabajo."},{"id":294,"comp":"Competencias Institucionales","tema":"Conciencia de equipo","txt":"La coordinación interdependencias en la CGR facilita el logro de objetivos comunes y la respuesta integral a los retos del control fiscal.","opts":{"A":"Genera duplicidad de esfuerzos.","B":"Limita la autonomía funcional.","C":"Facilita el logro de objetivos comunes.","D":"Sustituye la planeación estratégica."},"ans":"C","just":"La coordinación fortalece el desempeño institucional."},{"id":295,"comp":"Competencias Institucionales","tema":"Conciencia de equipo","txt":"La disposición para apoyar a otros equipos o dependencias, aun cuando no sea una obligación directa, refleja un nivel avanzado de conciencia de equipo y compromiso institucional.","opts":{"A":"Se limita a funciones estrictas.","B":"Genera sobrecarga innecesaria.","C":"Refleja compromiso institucional y colaboración.","D":"Sustituye la responsabilidad individual."},"ans":"C","just":"El apoyo transversal fortalece la institucionalidad."},{"id":296,"comp":"Competencias Institucionales","tema":"Conciencia de equipo","txt":"La retroalimentación respetuosa y orientada a la mejora fortalece el aprendizaje colectivo y el desempeño de los equipos de trabajo.","opts":{"A":"Genera conflictos personales.","B":"Carece de utilidad práctica.","C":"Fortalece aprendizaje y desempeño del equipo.","D":"Sustituye la evaluación formal."},"ans":"C","just":"La retroalimentación mejora el trabajo en equipo."},{"id":297,"comp":"Competencias Institucionales","tema":"Conciencia de equipo","txt":"Reconocer los logros colectivos y el aporte de los demás contribuye a fortalecer la motivación, el sentido de pertenencia y el compromiso institucional.","opts":{"A":"Desestimula la competencia individual.","B":"Aplica solo a líderes formales.","C":"Fortalece motivación y pertenencia.","D":"Sustituye incentivos formales."},"ans":"C","just":"El reconocimiento fortalece el equipo."},{"id":298,"comp":"Competencias Institucionales","tema":"Conciencia de equipo","txt":"La conciencia de equipo implica asumir responsabilidades compartidas frente a resultados, evitando la fragmentación del trabajo y promoviendo soluciones conjuntas.","opts":{"A":"Evita asumir errores.","B":"Asigna responsabilidades individuales siempre.","C":"Promueve responsabilidad compartida.","D":"Sustituye la rendición de cuentas."},"ans":"C","just":"La corresponsabilidad fortalece resultados."},{"id":299,"comp":"Competencias Institucionales","tema":"Conciencia de equipo","txt":"La colaboración efectiva entre equipos contribuye a mejorar la eficiencia, la calidad de los procesos y el impacto del control fiscal ejercido por la CGR.","opts":{"A":"Genera retrasos institucionales.","B":"Es irrelevante para el control fiscal.","C":"Mejora eficiencia y calidad del control fiscal.","D":"Sustituye la auditoría."},"ans":"C","just":"La colaboración potencia el control fiscal."},{"id":300,"comp":"Competencias Institucionales","tema":"Conciencia de equipo","txt":"El desarrollo avanzado de la conciencia de equipo permite al servidor de la CGR contribuir de manera articulada al logro de los objetivos institucionales y al fortalecimiento del control fiscal.","opts":{"A":"No tiene impacto institucional.","B":"Es secundaria frente a competencias técnicas.","C":"Fortalece el logro de objetivos institucionales.","D":"Sustituye la planeación estratégica."},"ans":"C","just":"El trabajo en equipo es clave para la CGR."},{"id":301,"comp":"Competencias Institucionales","tema":"Aprendizaje continuo","txt":"El aprendizaje continuo en nivel avanzado implica que el servidor público mantiene una actualización permanente de sus conocimientos técnicos, normativos y metodológicos, incorporando nuevas prácticas para mejorar su desempeño y aportar al fortalecimiento del control fiscal de la CGR.","opts":{"A":"Se limita a la formación inicial.","B":"Aplica solo en procesos de evaluación.","C":"Impulsa actualización permanente y mejora del desempeño.","D":"Sustituye la experiencia laboral."},"ans":"C","just":"El aprendizaje continuo fortalece la capacidad institucional."},{"id":302,"comp":"Competencias Institucionales","tema":"Aprendizaje continuo","txt":"Un servidor con aprendizaje continuo avanzado identifica brechas de conocimiento, busca activamente formación y aplica lo aprendido para mejorar procesos y resultados institucionales.","opts":{"A":"Depende exclusivamente de capacitaciones formales.","B":"Aplica solo a nuevos servidores.","C":"Identifica brechas y aplica nuevos aprendizajes.","D":"Sustituye la planeación estratégica."},"ans":"C","just":"Identificar brechas es base del aprendizaje efectivo."},{"id":303,"comp":"Competencias Institucionales","tema":"Aprendizaje continuo","txt":"La reflexión sobre experiencias pasadas y lecciones aprendidas permite mejorar la toma de decisiones futuras y fortalecer la calidad del trabajo desarrollado en la CGR.","opts":{"A":"Genera reprocesos innecesarios.","B":"Carece de impacto institucional.","C":"Permite mejorar decisiones futuras.","D":"Sustituye la retroalimentación externa."},"ans":"C","just":"Las lecciones aprendidas mejoran la gestión."},{"id":304,"comp":"Competencias Institucionales","tema":"Aprendizaje continuo","txt":"El aprendizaje colaborativo, mediante el intercambio de conocimientos entre equipos, potencia el desarrollo de capacidades institucionales y reduce riesgos asociados a la dependencia individual del conocimiento.","opts":{"A":"Genera pérdida de autonomía.","B":"Aplica solo a capacitaciones formales.","C":"Potencia capacidades y reduce riesgos de dependencia.","D":"Sustituye la gestión documental."},"ans":"C","just":"El aprendizaje colaborativo fortalece la institución."},{"id":305,"comp":"Competencias Institucionales","tema":"Aprendizaje continuo","txt":"La apertura al cambio y a nuevas metodologías de trabajo es una manifestación del aprendizaje continuo avanzado y contribuye a la modernización de la gestión pública.","opts":{"A":"Genera resistencia institucional.","B":"Limita la innovación.","C":"Favorece la modernización y mejora continua.","D":"Sustituye la normatividad vigente."},"ans":"C","just":"El aprendizaje impulsa la modernización institucional."},{"id":306,"comp":"Competencias Institucionales","tema":"Aprendizaje continuo","txt":"Un servidor con alto nivel de aprendizaje continuo utiliza tecnologías, herramientas y buenas prácticas para optimizar su gestión y adaptarse a entornos cambiantes.","opts":{"A":"Evita el uso de nuevas tecnologías.","B":"Aplica solo a áreas técnicas.","C":"Utiliza herramientas y tecnologías para mejorar la gestión.","D":"Sustituye la capacitación formal."},"ans":"C","just":"El uso de herramientas fortalece el desempeño."},{"id":307,"comp":"Competencias Institucionales","tema":"Aprendizaje continuo","txt":"La autoevaluación periódica del desempeño permite identificar oportunidades de mejora y orientar acciones de aprendizaje continuo en beneficio del cumplimiento de objetivos institucionales.","opts":{"A":"Genera carga administrativa.","B":"Aplica solo a evaluaciones externas.","C":"Permite identificar oportunidades de mejora.","D":"Sustituye la evaluación institucional."},"ans":"C","just":"La autoevaluación orienta el aprendizaje continuo."},{"id":308,"comp":"Competencias Institucionales","tema":"Aprendizaje continuo","txt":"El aprendizaje continuo avanzado implica compartir conocimientos adquiridos con otros servidores, contribuyendo al fortalecimiento colectivo y a la sostenibilidad del conocimiento institucional.","opts":{"A":"Limita el desarrollo individual.","B":"Genera dependencia organizacional.","C":"Fortalece el conocimiento colectivo.","D":"Sustituye la capacitación institucional."},"ans":"C","just":"Compartir conocimiento fortalece a la entidad."},{"id":309,"comp":"Competencias Institucionales","tema":"Aprendizaje continuo","txt":"En la CGR, el aprendizaje continuo permite responder a cambios normativos, técnicos y sociales, manteniendo la calidad y la efectividad del control fiscal.","opts":{"A":"No incide en el control fiscal.","B":"Es irrelevante para la gestión pública.","C":"Mantiene la calidad y efectividad del control fiscal.","D":"Sustituye la experiencia profesional."},"ans":"C","just":"El aprendizaje continuo sostiene el control fiscal."},{"id":310,"comp":"Competencias Institucionales","tema":"Aprendizaje continuo","txt":"El desarrollo avanzado del aprendizaje continuo permite al servidor de la CGR anticiparse a retos futuros, mejorar su desempeño y contribuir de manera sostenida a los objetivos estratégicos institucionales.","opts":{"A":"Carece de impacto institucional.","B":"Es secundaria frente a competencias técnicas.","C":"Contribuye al logro sostenible de objetivos institucionales.","D":"Sustituye la planeación estratégica."},"ans":"C","just":"El aprendizaje continuo es clave para la sostenibilidad institucional."},{"id":311,"comp":"Competencias Comportamentales","tema":"Experiencia profesional","txt":"La experiencia profesional en nivel intermedio implica aplicar conocimientos y habilidades adquiridos en contextos reales de trabajo, aportar soluciones prácticas y aprender de situaciones previas para mejorar el desempeño. En la CGR, esta competencia contribuye a decisiones técnicas con criterio.","opts":{"A":"Se limita al tiempo de servicio.","B":"Sustituye la formación académica.","C":"Permite aplicar aprendizajes y experiencia a situaciones reales.","D":"Depende exclusivamente de normas."},"ans":"C","just":"La experiencia profesional se evidencia en la aplicación práctica."},{"id":312,"comp":"Competencias Comportamentales","tema":"Experiencia profesional","txt":"Un servidor con experiencia profesional intermedia utiliza referentes de trabajos anteriores para resolver problemas actuales, evitando errores repetitivos y fortaleciendo la eficacia de su gestión.","opts":{"A":"Ignora experiencias previas.","B":"Aplica solo a cargos directivos.","C":"Aprovecha experiencias previas para resolver problemas.","D":"Sustituye la capacitación."},"ans":"C","just":"La experiencia permite mejorar la eficacia institucional."},{"id":313,"comp":"Competencias Comportamentales","tema":"Experiencia profesional","txt":"La experiencia profesional también implica reconocer los límites del propio conocimiento y solicitar orientación cuando la situación lo requiere, garantizando decisiones informadas y responsables.","opts":{"A":"Evita pedir apoyo.","B":"Genera dependencia permanente.","C":"Permite tomar decisiones responsables y oportunas.","D":"Sustituye la autonomía profesional."},"ans":"C","just":"Reconocer límites fortalece la gestión responsable."},{"id":314,"comp":"Competencias Comportamentales","tema":"Experiencia profesional","txt":"En el sector público, la experiencia profesional contribuye a comprender los procedimientos administrativos, los tiempos institucionales y las implicaciones legales de las actuaciones.","opts":{"A":"Limita la innovación.","B":"Carece de valor institucional.","C":"Permite comprender procesos y efectos legales.","D":"Sustituye la normatividad."},"ans":"C","just":"La experiencia mejora la comprensión institucional."},{"id":315,"comp":"Competencias Comportamentales","tema":"Experiencia profesional","txt":"La aplicación adecuada de la experiencia profesional permite anticipar riesgos operativos y administrativos, mitigando impactos negativos en la gestión pública.","opts":{"A":"Genera aversión al riesgo.","B":"Aplica solo a cargos directivos.","C":"Permite anticipar y mitigar riesgos.","D":"Sustituye la planeación."},"ans":"C","just":"Anticipar riesgos fortalece la gestión pública."},{"id":316,"comp":"Competencias Comportamentales","tema":"Experiencia profesional","txt":"Un servidor con experiencia profesional intermedia aprende de los errores cometidos, ajusta sus actuaciones futuras y contribuye a la mejora continua de los procesos institucionales.","opts":{"A":"Repite errores sistemáticamente.","B":"Evita la autoevaluación.","C":"Aprende de errores y mejora actuaciones.","D":"Sustituye el control interno."},"ans":"C","just":"Aprender de errores fortalece la gestión."},{"id":317,"comp":"Competencias Comportamentales","tema":"Experiencia profesional","txt":"La experiencia permite al servidor adaptarse a nuevos contextos institucionales, asumir cambios normativos y ajustar su gestión sin afectar el cumplimiento de los objetivos.","opts":{"A":"Resiste el cambio.","B":"Depende solo de capacitación formal.","C":"Facilita adaptación a cambios institucionales.","D":"Sustituye la planeación estratégica."},"ans":"C","just":"La adaptabilidad es producto de la experiencia."},{"id":318,"comp":"Competencias Comportamentales","tema":"Experiencia profesional","txt":"Compartir lecciones aprendidas derivadas de la experiencia profesional fortalece el aprendizaje colectivo y evita la dependencia de conocimientos individuales.","opts":{"A":"Genera pérdida de protagonismo.","B":"Limita la autonomía del servidor.","C":"Fortalece el aprendizaje colectivo institucional.","D":"Sustituye la capacitación formal."},"ans":"C","just":"Compartir experiencias fortalece a la institución."},{"id":319,"comp":"Competencias Comportamentales","tema":"Experiencia profesional","txt":"En la CGR, la experiencia profesional permite analizar situaciones complejas con criterio técnico, jurídico y administrativo, apoyando decisiones de control fiscal.","opts":{"A":"No tiene relación con control fiscal.","B":"Es irrelevante para el cargo.","C":"Apoya decisiones de control fiscal con criterio.","D":"Sustituye la formación normativa."},"ans":"C","just":"La experiencia aporta criterio al control fiscal."},{"id":320,"comp":"Competencias Comportamentales","tema":"Experiencia profesional","txt":"El desarrollo intermedio de la experiencia profesional contribuye al desempeño autónomo y responsable del servidor de la CGR, fortaleciendo la calidad de las actuaciones institucionales.","opts":{"A":"Carece de impacto institucional.","B":"Es secundaria frente a la formación.","C":"Fortalece la autonomía y calidad del desempeño.","D":"Sustituye la supervisión."},"ans":"C","just":"La experiencia fortalece la calidad institucional."},{"id":321,"comp":"Competencias Comportamentales","tema":"Comunicación efectiva","txt":"La comunicación efectiva en nivel intermedio implica transmitir información técnica y administrativa de manera clara, coherente y oportuna, considerando el contexto y el receptor, para facilitar la comprensión y la toma de decisiones en la CGR.","opts":{"A":"Usa lenguaje ambiguo.","B":"Prioriza cantidad sobre claridad.","C":"Transmite información clara y comprensible.","D":"Sustituye la comunicación formal."},"ans":"C","just":"La claridad es eje de la comunicación efectiva."},{"id":322,"comp":"Competencias Comportamentales","tema":"Comunicación efectiva","txt":"La adaptación del lenguaje según el público objetivo mejora la efectividad de la comunicación, evitando malentendidos y fortaleciendo la interacción institucional y ciudadana.","opts":{"A":"Usa siempre lenguaje técnico complejo.","B":"Aplica solo al ámbito oral.","C":"Adapta el lenguaje al receptor.","D":"Sustituye la normatividad escrita."},"ans":"C","just":"Adaptar el lenguaje mejora la comprensión."},{"id":323,"comp":"Competencias Comportamentales","tema":"Comunicación efectiva","txt":"La escucha activa permite comprender con precisión las solicitudes, inquietudes o instrucciones recibidas, reduciendo errores y mejorando la coordinación institucional.","opts":{"A":"Interrumpe constantemente.","B":"Carece de relevancia institucional.","C":"Facilita comprensión y reduce errores.","D":"Sustituye la comunicación escrita."},"ans":"C","just":"La escucha activa mejora la coordinación."},{"id":324,"comp":"Competencias Comportamentales","tema":"Comunicación efectiva","txt":"La comunicación escrita en la CGR debe ser precisa, estructurada y conforme a los lineamientos institucionales, garantizando trazabilidad y validez administrativa.","opts":{"A":"Es flexible y sin reglas.","B":"Aplica solo a comunicaciones internas.","C":"Debe ser precisa y conforme a lineamientos.","D":"Sustituye el archivo institucional."},"ans":"C","just":"La escritura formal garantiza trazabilidad."},{"id":325,"comp":"Competencias Comportamentales","tema":"Comunicación efectiva","txt":"La retroalimentación clara y respetuosa permite corregir errores, mejorar el desempeño y fortalecer la relación de trabajo entre servidores públicos.","opts":{"A":"Genera conflictos innecesarios.","B":"Aplica solo en evaluaciones formales.","C":"Mejora desempeño y relaciones laborales.","D":"Sustituye la evaluación institucional."},"ans":"C","just":"La retroalimentación fortalece el desempeño."},{"id":326,"comp":"Competencias Comportamentales","tema":"Comunicación efectiva","txt":"Una comunicación efectiva considera no solo el contenido del mensaje, sino también su oportunidad y el canal utilizado, asegurando que la información llegue de manera adecuada.","opts":{"A":"Prioriza solo el contenido.","B":"Aplica solo a comunicaciones orales.","C":"Considera contenido, oportunidad y canal.","D":"Sustituye la planeación."},"ans":"C","just":"La oportunidad es clave en la comunicación."},{"id":327,"comp":"Competencias Comportamentales","tema":"Comunicación efectiva","txt":"La comunicación asertiva permite expresar ideas, desacuerdos y observaciones de manera respetuosa, clara y constructiva dentro del equipo de trabajo.","opts":{"A":"Impone puntos de vista.","B":"Evita cualquier confrontación.","C":"Expresa ideas de forma clara y respetuosa.","D":"Sustituye la autoridad jerárquica."},"ans":"C","just":"La asertividad mejora el clima laboral."},{"id":328,"comp":"Competencias Comportamentales","tema":"Comunicación efectiva","txt":"En el contexto del control fiscal, la comunicación efectiva facilita la comprensión de hallazgos, recomendaciones y decisiones, fortaleciendo la credibilidad institucional.","opts":{"A":"Genera confusión en informes.","B":"Es irrelevante para el control fiscal.","C":"Fortalece comprensión de hallazgos y decisiones.","D":"Sustituye la auditoría."},"ans":"C","just":"La comunicación clara fortalece la credibilidad."},{"id":329,"comp":"Competencias Comportamentales","tema":"Comunicación efectiva","txt":"La coherencia entre comunicación verbal y escrita genera confianza y credibilidad en las actuaciones del servidor público ante sus interlocutores.","opts":{"A":"Genera mensajes contradictorios.","B":"Carece de impacto institucional.","C":"Fortalece la confianza institucional.","D":"Sustituye la ética pública."},"ans":"C","just":"La coherencia fortalece la credibilidad."},{"id":330,"comp":"Competencias Comportamentales","tema":"Comunicación efectiva","txt":"El dominio intermedio de la comunicación efectiva permite al servidor de la CGR interactuar de forma clara y profesional, contribuyendo a la eficiencia de los procesos y al control fiscal.","opts":{"A":"No incide en la gestión.","B":"Es secundaria frente a lo técnico.","C":"Contribuye a la eficiencia y control fiscal.","D":"Sustituye la supervisión."},"ans":"C","just":"La comunicación es clave para la eficiencia institucional."},{"id":331,"comp":"Competencias Comportamentales","tema":"Pensamiento conceptual","txt":"El pensamiento conceptual en nivel intermedio implica analizar información diversa, identificar patrones y relaciones, y estructurar ideas de manera lógica para comprender situaciones complejas propias de la gestión pública. En la CGR, esta competencia apoya el análisis técnico y fiscal.","opts":{"A":"Se limita a describir hechos.","B":"Aplica solo a tareas académicas.","C":"Permite analizar relaciones y estructurar ideas lógicas.","D":"Sustituye el conocimiento normativo."},"ans":"C","just":"El pensamiento conceptual organiza el análisis institucional."},{"id":332,"comp":"Competencias Comportamentales","tema":"Pensamiento conceptual","txt":"Un servidor con pensamiento conceptual intermedio sintetiza información relevante, distingue lo esencial de lo accesorio y facilita la comprensión de problemas administrativos o fiscales.","opts":{"A":"Acumula información sin análisis.","B":"Prioriza detalles irrelevantes.","C":"Distingue lo esencial y sintetiza información.","D":"Sustituye la experiencia profesional."},"ans":"C","just":"La síntesis facilita la toma de decisiones."},{"id":333,"comp":"Competencias Comportamentales","tema":"Pensamiento conceptual","txt":"La capacidad de abstraer conceptos generales a partir de casos específicos permite al servidor público extrapolar aprendizajes y aplicar criterios homogéneos en situaciones similares.","opts":{"A":"Se limita a casos aislados.","B":"Genera interpretaciones arbitrarias.","C":"Permite generalizar aprendizajes de casos específicos.","D":"Sustituye el análisis jurídico."},"ans":"C","just":"La abstracción mejora la consistencia de los criterios."},{"id":334,"comp":"Competencias Comportamentales","tema":"Pensamiento conceptual","txt":"El pensamiento conceptual facilita la comprensión de marcos normativos complejos al relacionar principios, reglas y procedimientos con su aplicación práctica.","opts":{"A":"Dificulta la aplicación normativa.","B":"Aplica solo a normas simples.","C":"Facilita comprender y aplicar marcos normativos.","D":"Sustituye la capacitación jurídica."},"ans":"C","just":"Relacionar normas y práctica mejora la aplicación legal."},{"id":335,"comp":"Competencias Comportamentales","tema":"Pensamiento conceptual","txt":"En contextos de análisis fiscal, el pensamiento conceptual permite identificar causas estructurales de problemas y no solo sus manifestaciones inmediatas.","opts":{"A":"Se enfoca solo en síntomas.","B":"Evita análisis profundo.","C":"Identifica causas estructurales de los problemas.","D":"Sustituye la auditoría técnica."},"ans":"C","just":"Identificar causas mejora la efectividad del control."},{"id":336,"comp":"Competencias Comportamentales","tema":"Pensamiento conceptual","txt":"La organización lógica de ideas y argumentos fortalece la elaboración de informes técnicos, conceptos y recomendaciones dentro de la CGR.","opts":{"A":"Genera informes extensos sin coherencia.","B":"Es irrelevante para la comunicación.","C":"Mejora la claridad y coherencia de informes.","D":"Sustituye lineamientos institucionales."},"ans":"C","just":"La lógica mejora la calidad de los informes."},{"id":337,"comp":"Competencias Comportamentales","tema":"Pensamiento conceptual","txt":"El pensamiento conceptual intermedio permite relacionar información técnica, jurídica y administrativa para comprender integralmente los procesos del control fiscal.","opts":{"A":"Analiza áreas de forma aislada.","B":"Carece de enfoque sistémico.","C":"Integra información de distintas áreas.","D":"Sustituye el trabajo en equipo."},"ans":"C","just":"La integración mejora el análisis fiscal."},{"id":338,"comp":"Competencias Comportamentales","tema":"Pensamiento conceptual","txt":"La formulación de conclusiones fundamentadas en análisis conceptual evita decisiones improvisadas y fortalece la solidez técnica de las actuaciones institucionales.","opts":{"A":"Depende de intuiciones personales.","B":"Genera rigidez extrema.","C":"Fortalece decisiones basadas en análisis.","D":"Sustituye la experiencia profesional."},"ans":"C","just":"Las conclusiones analíticas fortalecen la gestión."},{"id":339,"comp":"Competencias Comportamentales","tema":"Pensamiento conceptual","txt":"En la CGR, el pensamiento conceptual contribuye a interpretar adecuadamente la información fiscal y a sustentar hallazgos y recomendaciones con criterios claros y coherentes.","opts":{"A":"No incide en el control fiscal.","B":"Es secundaria frente a lo operativo.","C":"Fortalece la interpretación y sustentación de hallazgos.","D":"Sustituye la normatividad fiscal."},"ans":"C","just":"El pensamiento conceptual refuerza el rigor del control fiscal."},{"id":340,"comp":"Competencias Comportamentales","tema":"Pensamiento conceptual","txt":"El desarrollo intermedio del pensamiento conceptual permite al servidor de la CGR comprender problemas complejos, proponer enfoques coherentes y contribuir a decisiones técnicas de calidad institucional.","opts":{"A":"Carece de impacto institucional.","B":"Aplica solo al ámbito académico.","C":"Contribuye a decisiones técnicas de calidad.","D":"Sustituye la planeación estratégica."},"ans":"C","just":"El pensamiento conceptual respalda decisiones institucionales."}];</script>

    <!-- LOGICA APP -->
    <script>
        const app = {
            state: { answers: {}, verified: {}, results: {} }, // answers: id->letter, verified: id->bool, results: id->bool(correct)
            sections: [],
            currentSecIdx: 0,
            currentQIdx: 0,

            init: function() {
                // Identificar secciones únicas
                this.sections = [...new Set(DB.map(q => q.comp))].sort();
                
                // Cargar estado previo
                const saved = localStorage.getItem('cgr_app_v3');
                if(saved) this.state = JSON.parse(saved);
                
                this.renderDashboard();
            },

            save: function() {
                localStorage.setItem('cgr_app_v3', JSON.stringify(this.state));
            },

            resetAll: function() {
                Swal.fire({
                    title: '¿Reiniciar todo?',
                    text: "Se borrará todo tu progreso.",
                    icon: 'warning',
                    showCancelButton: true,
                    confirmButtonColor: '#ef4444',
                    confirmButtonText: 'Sí, borrar',
                    cancelButtonText: 'Cancelar'
                }).then((result) => {
                    if (result.isConfirmed) {
                        localStorage.removeItem('cgr_app_v3');
                        location.reload();
                    }
                });
            },

            // --- NAVEGACIÓN ---
            
            goHome: function() {
                this.switchView('view-dashboard');
                this.renderDashboard();
            },

            switchView: function(viewId) {
                ['view-dashboard', 'view-question', 'view-results'].forEach(id => {
                    document.getElementById(id).classList.add('hidden');
                });
                document.getElementById(viewId).classList.remove('hidden');
            },

            // --- DASHBOARD ---

            renderDashboard: function() {
                const grid = document.getElementById('competence-grid');
                grid.innerHTML = '';

                this.sections.forEach((sec, idx) => {
                    // Calcular progreso de esta sección
                    const sectionQs = DB.filter(q => q.comp === sec);
                    const total = sectionQs.length;
                    const answered = sectionQs.filter(q => this.state.answers[q.id]).length;
                    const pct = total > 0 ? Math.round((answered/total)*100) : 0;

                    // Crear tarjeta
                    const card = document.createElement('div');
                    card.className = 'bg-white p-6 rounded-2xl shadow-sm border border-slate-200 card-hover cursor-pointer flex flex-col h-full transition';
                    card.onclick = () => this.startSection(idx);

                    // Estilos dinámicos
                    let barColor = pct === 100 ? 'bg-green-500' : (pct > 0 ? 'bg-indigo-500' : 'bg-slate-200');
                    let btnText = pct === 0 ? 'Iniciar' : (pct === 100 ? 'Repasar' : 'Continuar');
                    let icon = pct === 100 ? 'fa-check' : 'fa-play';

                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-10 h-10 rounded-xl ${pct===100 ? 'bg-green-100 text-green-600' : 'bg-indigo-50 text-indigo-600'} flex items-center justify-center text-lg">
                                <i class="fa-solid ${icon}"></i>
                            </div>
                            <span class="text-xs font-bold text-slate-400 bg-slate-50 px-2 py-1 rounded border border-slate-100">${answered} / ${total}</span>
                        </div>
                        <h3 class="font-bold text-lg text-slate-800 mb-2 line-clamp-2" title="${sec}">${sec}</h3>
                        <div class="w-full bg-slate-100 rounded-full h-2 mb-4 overflow-hidden">
                            <div class="h-full ${barColor} transition-all duration-500" style="width: ${pct}%"></div>
                        </div>
                        <div class="mt-auto pt-4 border-t border-slate-50 flex justify-between items-center text-sm">
                            <span class="font-medium text-slate-500">${pct}%</span>
                            <span class="font-bold text-indigo-600 hover:underline">${btnText}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            },

            // --- SECCIÓN DE PREGUNTAS ---

            startSection: function(secIdx) {
                this.currentSecIdx = secIdx;
                
                // Encontrar la primera pregunta sin responder para continuar desde ahí
                const qs = this.getSectionQuestions();
                const firstUnanswered = qs.findIndex(q => !this.state.answers[q.id]);
                this.currentQIdx = firstUnanswered !== -1 ? firstUnanswered : 0;

                this.switchView('view-question');
                this.renderQuestion();
            },

            getSectionQuestions: function() {
                return DB.filter(q => q.comp === this.sections[this.currentSecIdx]);
            },

            renderQuestion: function() {
                const qs = this.getSectionQuestions();
                const q = qs[this.currentQIdx];
                const savedAns = this.state.answers[q.id];
                const isVerified = this.state.verified[q.id];

                // Header info
                document.getElementById('q-comp-title').innerText = q.comp;
                document.getElementById('q-current').innerText = this.currentQIdx + 1;
                document.getElementById('q-total').innerText = qs.length;
                document.getElementById('q-progress').style.width = Math.round(((this.currentQIdx+1)/qs.length)*100) + '%';

                // Contenido
                document.getElementById('q-topic').innerText = q.tema;
                document.getElementById('q-text').innerText = q.txt;
                document.getElementById('q-just').innerText = q.just;

                // Opciones
                const optsContainer = document.getElementById('q-options');
                optsContainer.innerHTML = '';

                ['A','B','C','D'].forEach(letter => {
                    if(!q.opts[letter]) return;

                    const btn = document.createElement('div');
                    const isSelected = savedAns === letter;
                    
                    let className = "opt-card w-full p-4 rounded-xl cursor-pointer flex gap-4 items-start bg-white relative overflow-hidden group";
                    
                    // Lógica de colores si está verificado
                    if (isVerified) {
                        if (letter === q.ans) {
                            className = "w-full p-4 rounded-xl border-2 border-green-500 bg-green-50 flex gap-4 items-start"; // Correcta
                        } else if (isSelected && letter !== q.ans) {
                            className = "w-full p-4 rounded-xl border-2 border-red-500 bg-red-50 flex gap-4 items-start"; // Error
                        } else {
                            className = "w-full p-4 rounded-xl border border-slate-100 bg-slate-50 opacity-50 flex gap-4 items-start grayscale"; // Resto
                        }
                    } else if (isSelected) {
                        className += " selected";
                    }

                    btn.className = className;

                    // Click event (solo si no está verificado)
                    if (!isVerified) {
                        btn.onclick = () => {
                            this.state.answers[q.id] = letter;
                            this.state.results[q.id] = (letter === q.ans);
                            this.save();
                            this.renderQuestion(); // Re-render para actualizar UI
                        };
                    }

                    btn.innerHTML = `
                        <div class="w-8 h-8 rounded-full border-2 border-slate-200 flex items-center justify-center flex-shrink-0 text-sm font-bold mt-0.5 bg-white transition-colors ${isSelected ? 'border-indigo-600 text-indigo-600' : ''}">${letter}</div>
                        <div class="flex-1 text-sm md:text-base font-medium leading-relaxed text-slate-700 z-10">${q.opts[letter]}</div>
                    `;
                    optsContainer.appendChild(btn);
                });

                // Control de visualización Feedback
                const fbBox = document.getElementById('q-feedback');
                if (isVerified) fbBox.classList.remove('hidden');
                else fbBox.classList.add('hidden');

                // Botones
                const btnVerify = document.getElementById('btn-verify');
                const btnNext = document.getElementById('btn-next');

                // Mostrar botón verificar si hay respuesta y aun no verificado
                if (savedAns && !isVerified) {
                    btnVerify.classList.remove('hidden');
                } else {
                    btnVerify.classList.add('hidden');
                }

                // Texto botón siguiente
                if (this.currentQIdx === qs.length - 1) {
                    btnNext.innerHTML = 'Finalizar Sección <i class="fa-solid fa-flag-checkered ml-2"></i>';
                    btnNext.onclick = () => this.finishSection();
                } else {
                    btnNext.innerHTML = 'Siguiente <i class="fa-solid fa-arrow-right ml-2"></i>';
                    btnNext.onclick = () => this.nav(1);
                }
            },

            check: function() {
                const qs = this.getSectionQuestions();
                const q = qs[this.currentQIdx];
                this.state.verified[q.id] = true;
                this.save();
                this.renderQuestion();
            },

            nav: function(dir) {
                const qs = this.getSectionQuestions();
                const next = this.currentQIdx + dir;
                if(next >= 0 && next < qs.length) {
                    this.currentQIdx = next;
                    this.renderQuestion();
                    document.getElementById('q-scroll-area').scrollTop = 0;
                }
            },

            finishSection: function() {
                const qs = this.getSectionQuestions();
                const unanswered = qs.filter(q => !this.state.answers[q.id]);

                if (unanswered.length > 0) {
                    Swal.fire({
                        title: 'Sección Incompleta',
                        text: `Faltan ${unanswered.length} preguntas. ¿Quieres ver resultados de todos modos?`,
                        icon: 'question',
                        showCancelButton: true,
                        confirmButtonText: 'Sí, finalizar',
                        cancelButtonText: 'Continuar'
                    }).then((r) => { if (r.isConfirmed) this.showResults(qs); });
                } else {
                    this.showResults(qs);
                }
            },

            // --- RESULTADOS ---

            showResults: function(qs) {
                this.switchView('view-results');
                
                let correctCount = 0;
                const topicStats = {}; // { 'Tema': {total:0, ok:0} }

                qs.forEach(q => {
                    const isOk = this.state.results[q.id];
                    if (isOk) correctCount++;
                    
                    if (!topicStats[q.tema]) topicStats[q.tema] = { total: 0, ok: 0 };
                    topicStats[q.tema].total++;
                    if (isOk) topicStats[q.tema].ok++;
                });

                // Generales
                document.getElementById('r-ok').innerText = correctCount;
                document.getElementById('r-err').innerText = qs.length - correctCount;
                document.getElementById('r-pct').innerText = Math.round((correctCount/qs.length)*100) + '%';

                // Temas a reforzar (< 70%)
                const topicList = document.getElementById('topic-list');
                topicList.innerHTML = '';
                
                const weakTopics = Object.entries(topicStats)
                    .map(([name, data]) => ({ name, pct: Math.round((data.ok/data.total)*100) }))
                    .sort((a,b) => a.pct - b.pct);

                let hasWeak = false;
                weakTopics.forEach(t => {
                    if (t.pct < 70) {
                        hasWeak = true;
                        const item = document.createElement('div');
                        item.className = 'flex justify-between items-center p-3 bg-red-50 border border-red-100 rounded-lg text-sm';
                        item.innerHTML = `<span class="font-bold text-red-800 truncare mr-2">${t.name}</span><span class="bg-white px-2 py-0.5 rounded text-red-600 font-bold border border-red-200 shadow-sm">${t.pct}%</span>`;
                        topicList.appendChild(item);
                    }
                });

                if (!hasWeak) {
                    topicList.innerHTML = '<div class="p-6 text-center text-green-600 bg-green-50 rounded-xl border border-green-100 font-medium">¡Excelente trabajo! No tienes temas críticos.</div>';
                }

                // Detalle Preguntas
                const detailList = document.getElementById('detail-list');
                detailList.innerHTML = '';

                qs.forEach((q, i) => {
                    const ans = this.state.answers[q.id];
                    const isOk = this.state.results[q.id];
                    
                    const item = document.createElement('div');
                    item.className = 'p-4 hover:bg-slate-50 cursor-pointer transition border-b border-slate-100 last:border-0 flex gap-3 items-start group';
                    
                    item.onclick = () => {
                        Swal.fire({
                            title: isOk ? '<span class="text-green-600">¡Correcto!</span>' : '<span class="text-red-600">Incorrecto</span>',
                            html: `
                                <div class="text-left text-sm space-y-3">
                                    <p class="bg-slate-50 p-3 rounded font-medium text-slate-700">${q.txt}</p>
                                    <div class="grid gap-2">
                                        <div class="p-2 border rounded ${isOk ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'}">
                                            <span class="text-xs font-bold uppercase opacity-50 block">Tu respuesta</span>
                                            <b>${ans || 'Ninguna'})</b> ${ans ? q.opts[ans] : ''}
                                        </div>
                                        ${!isOk ? `<div class="p-2 border rounded bg-green-50 border-green-200">
                                            <span class="text-xs font-bold uppercase opacity-50 block text-green-700">Correcta</span>
                                            <b>${q.ans})</b> ${q.opts[q.ans]}
                                        </div>` : ''}
                                    </div>
                                    <div class="bg-blue-50 p-3 rounded border border-blue-100 text-blue-900 text-xs">
                                        <b>Justificación:</b> ${q.just}
                                    </div>
                                </div>
                            `,
                            confirmButtonColor: '#1e293b'
                        });
                    };

                    let icon = !ans ? '<i class="fa-solid fa-minus text-slate-300"></i>' : (isOk ? '<i class="fa-solid fa-check text-green-500"></i>' : '<i class="fa-solid fa-xmark text-red-500"></i>');

                    item.innerHTML = `
                        <div class="w-6 flex justify-center pt-0.5">${icon}</div>
                        <div class="flex-1 text-sm text-slate-600 font-medium group-hover:text-indigo-600 transition truncate">${i+1}. ${q.txt}</div>
                        <i class="fa-solid fa-chevron-right text-xs text-slate-300 group-hover:text-indigo-400"></i>
                    `;
                    detailList.appendChild(item);
                });
            }
        };

        // Iniciar App Generada
        window.onload = () => app.init();
    </script>
</body>
</html>
